name: ci-failure-scan-eval
description: Dynamic gate for the CI failure scanner's safe-output (maintainer /ci-scan eval). Runs the scanner against a LIVE outer-loop failure it discovers itself, then checks the emitted Known Build Error against the static KBE format and that it actually grounded the KBE in a real failing build.

defaults:
  judge_model: claude-opus-4.8
  model: claude-opus-4.8
  runs: 1
  timeout: 25m

scoring:
  threshold: 0.7

stimuli:
  - name: live-kbe-safe-output
    environment:
      files:
        - src: ../ci-failure-scan.md
          dest: .github/workflows/ci-failure-scan.md
        - src: ../shared/create-kbe.instructions.md
          dest: .github/workflows/shared/create-kbe.instructions.md
    constraints:
      max_tokens: 500000
      max_turns: 100
      max_duration: 25m
      expect_tools: ["bash"]
    prompt: |
      You are being evaluated as the CI Outer-Loop Failure Scanner. Follow the KBE format and rules in `.github/workflows/ci-failure-scan.md` and `.github/workflows/shared/create-kbe.instructions.md`.

      This is a LIVE run — discover a REAL, currently-failing outer-loop build yourself. Do NOT invent a failure.

      1. Find a recent FAILED build on `main` of an outer-loop pipeline via the dnceng-public AzDO REST API (anonymous, no auth — stay on `_apis/build/...`). Start with `runtime-extra-platforms` (definition 154), and fall back to other outer-loop defs if needed:
         `curl -fsSL "https://dev.azure.com/dnceng-public/public/_apis/build/builds?definitions=154&branchName=refs/heads/main&statusFilter=completed&resultFilter=failed&\$top=5&api-version=7.1"`
      2. Open that build's timeline (`/_apis/build/builds/{id}/timeline?api-version=7.1`), pick a failed leg, and read its log (`/_apis/build/builds/{id}/logs/{logId}?api-version=7.1`) to extract a concrete error/assertion signature. Save the leg log you extract from as `failure.log` under /tmp and grep it for your signature to get the hit count.
      3. Before filing, check whether an equivalent KBE already exists so you would not duplicate it: `gh search issues 'in:title [ci-scan]' --repo dotnet/runtime --state open` and by your signature text. Assume you would file only if none matches.

      Then **emit the create-issue safe-output you would file, as a single markdown document at `./out/kbe.md`**, in exactly this shape:

      - First line: `Title: [ci-scan] <one stable failure shape>` (an assertion string or test family — no build numbers, dates, queue/machine names, or run IDs).
      - Second line: `Labels: Known Build Error, <blocking-clean-ci|blocking-clean-ci-optional>` (pick exactly one blocking label; the JIT/GC/PGO stress pipelines are `optional-ci` and use `blocking-clean-ci-optional`, the required gate uses `blocking-clean-ci`).
      - Then a blank line and the KBE issue body per the shared template: a `## Build Information` section citing the real build id and leg you found, a `## Error Details` section with the fenced log excerpt, and a `## Error Message` section containing exactly one ` ```json ` block with the four keys `ErrorMessage`, `ErrorPattern`, `BuildRetry`, `ExcludeConsoleLog` (exactly one of `ErrorMessage`/`ErrorPattern` non-empty, a specific substring copied verbatim from the real log — never a bare test name).
      - Embed the `<!-- ci-scan-match-count: <N> hits in failure.log -->` marker with the real grep count from step 2.

      Outer-loop pipelines have failing `main` builds essentially all the time — search across defs (154 and other outer-loop defs) until you find a real one; do not give up and do not fabricate. Keep all scratch state under /tmp.

    graders:
      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?im)^Title:\s*\[ci-scan\]\s+\S'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?im)^Labels:\s*Known Build Error,\s*blocking-clean-ci(-optional)?\s*$'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?s)##\s+Build Information.*##\s+Error Details.*##\s+Error Message'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?s)```json\s*\{.*"ErrorMessage".*"ErrorPattern".*"BuildRetry".*"ExcludeConsoleLog".*\}\s*```'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: 'ci-scan-match-count:\s*\d+\s*hits'

      - type: file-not-matches
        config:
          path: "out/kbe.md"
          pattern: '(?i)\[ActiveIssue|\[SkipOnPlatform|Skip\s*=\s*"|GCStressIncompatible|NativeAotIncompatible|TestUnsupported|\bmut(e|ed|es|ing)\b'

      - type: tool-calls
        name: fetched-real-failing-build
        config:
          required:
            - name: 'bash'
              command: 'curl.*dev\.azure\.com/dnceng-public/public/_apis/build'

      - type: tool-calls
        name: searched-existing-kbe
        config:
          required:
            - name: 'bash'
              command: 'gh (search|issue)'

      - type: prompt
        name: kbe-format-conformant
        config:
          scoring: binary
          prompt: |
            Read ./out/kbe.md. Pass ONLY if it conforms to the static Known Build Error format: a `[ci-scan] ` title naming exactly one failure shape (no run-specific IDs), the `Known Build Error` label plus exactly one of `blocking-clean-ci`/`blocking-clean-ci-optional`, the three body sections, and exactly ONE fenced json block with all four keys where exactly one of ErrorMessage/ErrorPattern is a non-empty specific substring (not a bare identifier) and the other is `""`, and the Build Information section cites a concrete real build id. Otherwise fail.
