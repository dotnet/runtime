name: ci-failure-scan-eval
description: Format gate for the CI failure scanner's safe-output (maintainer /ci-scan eval). Checks the emitted Known Build Error against the static KBE format — not triage correctness.

defaults:
  judge_model: claude-opus-4.8
  model: claude-opus-4.8
  runs: 1
  timeout: 10m

scoring:
  threshold: 0.7

stimuli:
  - name: kbe-safe-output-format
    environment:
      files:
        - src: ../ci-failure-scan.md
          dest: .github/workflows/ci-failure-scan.md
        - src: ../shared/create-kbe.instructions.md
          dest: .github/workflows/shared/create-kbe.instructions.md
    constraints:
      max_tokens: 300000
      max_turns: 60
      max_duration: 10m
    prompt: |
      You are being evaluated as the CI Outer-Loop Failure Scanner. Follow the KBE format in `.github/workflows/ci-failure-scan.md` and `.github/workflows/shared/create-kbe.instructions.md`.

      This is an OFFLINE format check. Do not hit the network and do not search for existing KBEs — assume none exists. Treat the block below as the single in-scope failure and as the contents of `failure.log`:

      ```
      Build: https://dev.azure.com/dnceng-public/public/_build/results?buildId=1490999
      Leg: windows-x64 Release - System.Text.Json.Tests / runtime-coreclr libraries-jitstress (def 138)
      Helix queue: Windows.10.Amd64.Open

      System.Text.Json.Tests.JsonSerializerTests.DeserializePolymorphic_RoundTrips [FAIL]
        Assert.Equal() Failure: Values differ
        Expected: Derived { Id = 7 }
        Actual:   Base { Id = 0 }
        at System.Text.Json.Tests.JsonSerializerTests.DeserializePolymorphic_RoundTrips()
      ```

      **Emit the create-issue safe-output you would file, as a single markdown document at `./out/kbe.md`**, in exactly this shape:

      - First line: `Title: [ci-scan] <one stable failure shape>` (an assertion string or test family — no build numbers, dates, queue/machine names, or run IDs).
      - Second line: `Labels: Known Build Error, <blocking-clean-ci|blocking-clean-ci-optional>` (pick exactly one blocking label; def 138 is an `optional-ci` pipeline).
      - Then a blank line and the KBE issue body per the shared template: a `## Build Information` section, a `## Error Details` section with the fenced stack-trace excerpt, and a `## Error Message` section containing exactly one ` ```json ` block with the four keys `ErrorMessage`, `ErrorPattern`, `BuildRetry`, `ExcludeConsoleLog` (exactly one of `ErrorMessage`/`ErrorPattern` non-empty, a specific substring copied verbatim from the log — never a bare test name).
      - Embed the `<!-- ci-scan-match-count: <N> hits in failure.log -->` marker per the verification rules.

      Keep all scratch state under /tmp.

    graders:
      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?im)^Title:\s*\[ci-scan\]\s+\S'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?im)^Labels:\s*Known Build Error,\s*blocking-clean-ci(-optional)?\s*$'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?s)##\s+Build Information.*##\s+Error Details.*##\s+Error Message'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: '(?s)```json\s*\{.*"ErrorMessage".*"ErrorPattern".*"BuildRetry".*"ExcludeConsoleLog".*\}\s*```'

      - type: file-matches
        config:
          path: "out/kbe.md"
          pattern: 'ci-scan-match-count:\s*\d+\s*hits'

      - type: file-not-matches
        config:
          path: "out/kbe.md"
          pattern: '\[ActiveIssue|\[SkipOnPlatform|Skip\s*=\s*"|GCStressIncompatible|NativeAotIncompatible|TestUnsupported|\bMut(e|ing)\b'

      - type: prompt
        name: kbe-format-conformant
        config:
          scoring: binary
          prompt: |
            Read ./out/kbe.md. Pass ONLY if it conforms to the static Known Build Error format: a `[ci-scan] ` title naming exactly one failure shape (no run-specific IDs), the `Known Build Error` label plus exactly one of `blocking-clean-ci`/`blocking-clean-ci-optional`, the three body sections, and exactly ONE fenced json block with all four keys where exactly one of ErrorMessage/ErrorPattern is a non-empty specific substring (not a bare identifier) and the other is `""`. Otherwise fail.
