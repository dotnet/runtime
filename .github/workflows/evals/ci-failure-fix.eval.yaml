name: ci-failure-fix-eval
description: Behavior gate for the CI failure fixer's safe-output (maintainer /ci-fix eval). Checks that it either produced a fix PR or engaged owners — not fix correctness.

defaults:
  judge_model: claude-opus-4.8
  model: claude-opus-4.8
  runs: 1
  timeout: 12m

scoring:
  threshold: 0.7

stimuli:
  - name: fix-or-engage-safe-output
    environment:
      files:
        - src: ../ci-failure-fix.md
          dest: .github/workflows/ci-failure-fix.md
        - src: ../shared/create-kbe.instructions.md
          dest: .github/workflows/shared/create-kbe.instructions.md
    constraints:
      max_tokens: 400000
      max_turns: 80
      max_duration: 12m
    prompt: |
      You are being evaluated as the CI Outer-Loop Failure Fixer. Follow the escalation policy in `.github/workflows/ci-failure-fix.md`.

      This is an OFFLINE behavior check. Do not hit the network. Act on the single open `[ci-scan]` KBE below and the small source snippet provided as the current repo state:

      Open KBE — dotnet/runtime#900001 `[ci-scan] IndexOutOfRangeException in ArrayPool.Return when clearArray is true`:
      ```
      System.Buffers.Tests.ArrayPoolTests.Return_ClearsArray_WhenRequested [FAIL]
        System.IndexOutOfRangeException: Index was outside the bounds of the array.
        at System.Buffers.ConfigurableArrayPool`1.Return(T[] array, Boolean clearArray)
      ```

      Repo snippet at HEAD — `src/libraries/System.Private.CoreLib/src/System/Buffers/ConfigurableArrayPool.cs`:
      ```csharp
      public override void Return(T[] array, bool clearArray = false)
      {
          if (clearArray)
          {
              Array.Clear(array, 0, array.Length + 1); // off-by-one
          }
          // ... bucket return elided ...
      }
      ```

      **Emit the single safe-output you would produce, as a markdown document at `./out/decision.md`.** Pick exactly one outcome per the escalation policy and make the type explicit on the first line:

      - `Type: create-pull-request` — for a confident, in-bounds, low-risk fix. Then add `Title: [ci-fix] <summary>`, a `Linked KBE: #900001` line, a one-paragraph `## Description`, and the candidate change as a fenced ` ```diff ` block. The diff MUST be a genuine product change — never a test-disable, `[ActiveIssue]`, `[SkipOnPlatform]`, `<*Incompatible>`, `Skip="..."`, or csproj exclusion.
      - `Type: add-comment` — when the fix is out of the agent's bounds or needs an owner. Then add a `## Comment` section that concretely explains why no safe diff is producible and @-mentions or names the owning area/team to loop in, linking the KBE.

      Keep all scratch state under /tmp.

    graders:
      - type: file-matches
        config:
          path: "out/decision.md"
          pattern: '(?im)^Type:\s*(create-pull-request|add-comment)\b'

      - type: file-matches
        config:
          path: "out/decision.md"
          pattern: '(?s)(Type:\s*create-pull-request.*Linked KBE:\s*#\d+.*```diff)|(Type:\s*add-comment.*##\s+Comment)'

      - type: file-not-matches
        config:
          path: "out/decision.md"
          pattern: '\[ActiveIssue|\[SkipOnPlatform|Skip\s*=\s*"|GCStressIncompatible|NativeAotIncompatible|TestUnsupported'

      - type: prompt
        name: fix-or-engages-owners
        config:
          scoring: binary
          prompt: |
            Read ./out/decision.md. Pass ONLY if the agent produced ONE actionable safe-output that either (a) creates a fix PR — a `[ci-fix]` title, a link to the KBE, and a real product/test diff that plausibly addresses the failure (here, the off-by-one in Array.Clear), OR (b) posts an owner-engagement comment that concretely explains why no safe fix is producible and names/@-mentions who to loop in. Fail if it does neither, if it emits both, or if the "fix" merely disables/skips/excludes the failing test rather than changing product behavior. Otherwise fail.
