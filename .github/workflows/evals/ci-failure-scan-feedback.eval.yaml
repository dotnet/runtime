name: ci-failure-scan-feedback-eval
description: Constructiveness gate for the CI feedback (meta) workflow's safe-output (maintainer /ci-feedback eval). Checks that it turns a real signal into something constructive.

defaults:
  judge_model: claude-opus-4.8
  model: claude-opus-4.8
  runs: 1
  timeout: 10m

scoring:
  threshold: 0.7

stimuli:
  - name: constructive-feedback-safe-output
    environment:
      files:
        - src: ../ci-failure-scan-feedback.md
          dest: .github/workflows/ci-failure-scan-feedback.md
        - src: ../ci-failure-scan.md
          dest: .github/workflows/ci-failure-scan.md
        - src: ../shared/create-kbe.instructions.md
          dest: .github/workflows/shared/create-kbe.instructions.md
    constraints:
      max_tokens: 300000
      max_turns: 60
      max_duration: 10m
    prompt: |
      You are being evaluated as the CI Scanner Feedback (meta) workflow. Follow `.github/workflows/ci-failure-scan-feedback.md`.

      This is an OFFLINE constructiveness check. Do not hit the network. Base your output only on the recorded signals below from the last period:

      Scanner/fixer artifacts:
      - dotnet/runtime#901010 `[ci-scan] Test failure: HttpClientTest.SendAsync_Cancel` — CLOSED as "Known issue did not match with the provided build" 2 days after filing.
      - dotnet/runtime#901011 `[ci-scan] Assert.Equal failure in JsonSerializerTests` — still open, Build Analysis matching normally.
      - `[ci-fix] #901020` — draft PR linked to #901011, no review yet.

      Maintainer feedback (MEMBER/OWNER):
      - On #901010, @dotnet-maintainer commented: "This signature was a bare test name, so Build Analysis matched passing runs too and auto-closed it. The scanner keeps filing bare-identifier signatures — the KBE rules say the ErrorMessage must be a specific substring, but nothing enforces it before filing."

      **Emit the safe-output you would produce, as a markdown document at `./out/feedback.md`.** Make it constructive:

      - A short `## What happened` grounding: quantify the period (KBEs filed, how many auto-closed as non-matching, fixes opened) and name the concrete miss.
      - A `## Proposed prompt edit` section ONLY if a signal justifies it: quote the triggering maintainer comment, then state the one specific edit it drives, restricted to `.github/workflows/ci-failure-scan.md`, `.github/workflows/ci-failure-fix.md`, or `.github/workflows/shared/create-kbe.instructions.md`. If no signal justifies an edit, say so explicitly instead.

      Keep the output specific, actionable, and verifiable next period. Keep scratch under /tmp.

    graders:
      - type: file-matches
        config:
          path: "out/feedback.md"
          pattern: '(?s)##\s+What happened'

      - type: file-matches
        config:
          path: "out/feedback.md"
          pattern: '(?i)(bare|substring|signature|ErrorMessage|match)'

      - type: prompt
        name: is-constructive
        config:
          scoring: binary
          prompt: |
            Read ./out/feedback.md. Pass ONLY if the feedback is constructive: it (a) is grounded in the recorded signals with at least one quantified observation, (b) identifies the concrete miss (the scanner filed a bare-identifier signature that Build Analysis auto-closed), and (c) turns it into a specific, actionable next step — a single prompt edit that quotes the triggering maintainer comment and targets one of the allowed workflow/instruction files, OR an explicit, justified statement that no edit is warranted. Fail if it is vague, ungrounded, invents a signal not present, proposes an edit to a file outside the allowed set, or is a generic status recap with no actionable conclusion. Otherwise fail.

      - type: prompt
        name: edit-is-grounded
        config:
          scoring: binary
          prompt: |
            Read ./out/feedback.md. If it proposes a prompt edit, pass ONLY if that edit quotes and is driven by the real maintainer comment in the scenario (the bare-identifier-signature miss) and is restricted to `.github/workflows/ci-failure-scan.md`, `.github/workflows/ci-failure-fix.md`, or `.github/workflows/shared/create-kbe.instructions.md`. If it proposes NO edit, pass ONLY if it explicitly justifies why none is warranted. Otherwise fail.
