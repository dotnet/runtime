name: ci-failure-scan-feedback-eval
description: Dynamic constructiveness gate for the CI feedback (meta) workflow's safe-output (maintainer /ci-feedback eval). The agent scans REAL recent scanner issues and fixer PRs itself, then must turn a real signal into constructive, grounded feedback.

defaults:
  judge_model: claude-opus-4.8
  model: claude-opus-4.8
  runs: 1
  timeout: 25m

scoring:
  threshold: 0.7

stimuli:
  - name: live-constructive-feedback-safe-output
    environment:
      files:
        - src: ../ci-failure-scan-feedback.md
          dest: .github/workflows/ci-failure-scan-feedback.md
        - src: ../ci-failure-scan.md
          dest: .github/workflows/ci-failure-scan.md
        - src: ../ci-failure-fix.md
          dest: .github/workflows/ci-failure-fix.md
        - src: ../shared/create-kbe.instructions.md
          dest: .github/workflows/shared/create-kbe.instructions.md
    constraints:
      max_tokens: 500000
      max_turns: 100
      max_duration: 25m
      expect_tools: ["bash"]
    prompt: |
      You are being evaluated as the CI Scanner Feedback (meta) workflow. Follow `.github/workflows/ci-failure-scan-feedback.md`.

      This is a LIVE run — gather the signals yourself from the real repository. Do NOT invent signals.

      1. Scan the scanner's recent output: `gh search issues 'in:title [ci-scan]' --repo dotnet/runtime --sort created --limit 30` (include recently CLOSED ones — an auto-closed `[ci-scan]` KBE is a strong signal). For a few, `gh issue view <n> --repo dotnet/runtime --comments` to read maintainer (MEMBER/OWNER) feedback and the close reason.
      2. Scan the fixer's recent output: `gh search prs 'in:title [ci-fix]' --repo dotnet/runtime --sort created --limit 30` and note their state (open/merged/closed, review status).

      Then **emit the safe-output you would produce, as a markdown document at `./out/feedback.md`.** Make it constructive and grounded in what you actually found:

      - A short `## What happened` section that quantifies the period from the real data (how many `[ci-scan]` KBEs filed, how many auto-closed as non-matching, how many `[ci-fix]` PRs opened/merged) and names the concrete miss you see.
      - A `## Proposed prompt edit` section ONLY if a real signal justifies it: quote the triggering maintainer comment or close reason, then state the one specific edit it drives, restricted to `.github/workflows/ci-failure-scan.md`, `.github/workflows/ci-failure-fix.md`, or `.github/workflows/shared/create-kbe.instructions.md`. If no signal justifies an edit, say so explicitly instead.

      Keep the output specific, actionable, and verifiable next period. Keep scratch under /tmp.

    graders:
      - type: file-matches
        config:
          path: "out/feedback.md"
          pattern: '(?s)##\s+What happened'

      - type: tool-calls
        name: scanned-scan-issues
        config:
          required:
            - name: 'bash'
              command: 'gh (search|issue).*ci-scan'

      - type: tool-calls
        name: scanned-fix-prs
        config:
          required:
            - name: 'bash'
              command: 'gh (search|pr).*ci-fix'

      - type: prompt
        name: is-constructive
        config:
          scoring: binary
          prompt: |
            Read ./out/feedback.md. Pass ONLY if the feedback is constructive: it (a) is grounded in the real scanner/fixer signals with at least one quantified observation, (b) identifies a concrete miss, and (c) turns it into a specific, actionable next step — a single prompt edit that quotes the triggering maintainer comment or close reason and targets one of the allowed workflow/instruction files, OR an explicit, justified statement that no edit is warranted. Fail if it is vague, ungrounded, invents a signal not present in the data it gathered, proposes an edit to a file outside the allowed set, or is a generic status recap with no actionable conclusion. Otherwise fail.

      - type: prompt
        name: edit-is-grounded
        config:
          scoring: binary
          prompt: |
            Read ./out/feedback.md. If it proposes a prompt edit, pass ONLY if that edit quotes and is driven by a real maintainer comment or close reason it gathered, and is restricted to `.github/workflows/ci-failure-scan.md`, `.github/workflows/ci-failure-fix.md`, or `.github/workflows/shared/create-kbe.instructions.md`. If it proposes NO edit, pass ONLY if it explicitly justifies why none is warranted. Otherwise fail.
