name: ci-workflow-eval-pr-probe

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/ci-eval.yml
      - .github/workflows/ci-eval-pr-probe.yml

permissions:
  contents: read

jobs:
  probe:
    if: github.repository == 'dotnet/runtime' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: copilot-pat-pool
    permissions:
      issues: write
      pull-requests: read
      statuses: write
    steps:
      - name: Probe eval reporting permissions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: ${{ secrets.GH_AW_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = '<!-- ci-workflow-eval-pr-probe -->';
            const body = `${marker}\n` +
              '> [!NOTE]\n' +
              '> The CI workflow eval reporting probe created this comment, reaction, and PR-head status.\n\n' +
              `Probe run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner, repo, sha, state: 'pending',
              context: 'ci-workflow-eval-pr-probe',
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Testing eval report permissions',
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            const comment = existing ?
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              }) :
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number, body,
              });
            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: comment.data.id, content: 'eyes',
            });
            await github.rest.repos.createCommitStatus({
              owner, repo, sha, state: 'success',
              context: 'ci-workflow-eval-pr-probe',
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Eval report permissions are working',
            });
