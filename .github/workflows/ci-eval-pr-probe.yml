name: ci-workflow-eval-pr-probe

on:
  pull_request:
    types: [opened, synchronize, reopened]
    paths:
      - .github/workflows/ci-eval.yml
      - .github/workflows/ci-eval-pr-probe.yml

permissions:
  contents: read

jobs:
  pat_pool:
    runs-on: ubuntu-latest
    environment: copilot-pat-pool
    permissions: {}
    outputs:
      pat_number: ${{ steps.select-pat-number.outputs.copilot_pat_number }}
    steps:
      - name: Select writable Copilot token
        id: select-pat-number
        env:
          COPILOT_PAT_0: ${{ secrets.COPILOT_PAT_0 }}
          COPILOT_PAT_1: ${{ secrets.COPILOT_PAT_1 }}
          COPILOT_PAT_2: ${{ secrets.COPILOT_PAT_2 }}
          COPILOT_PAT_3: ${{ secrets.COPILOT_PAT_3 }}
          COPILOT_PAT_4: ${{ secrets.COPILOT_PAT_4 }}
          COPILOT_PAT_5: ${{ secrets.COPILOT_PAT_5 }}
          COPILOT_PAT_6: ${{ secrets.COPILOT_PAT_6 }}
          COPILOT_PAT_7: ${{ secrets.COPILOT_PAT_7 }}
          COPILOT_PAT_8: ${{ secrets.COPILOT_PAT_8 }}
          COPILOT_PAT_9: ${{ secrets.COPILOT_PAT_9 }}
        run: |
          for i in $(seq 0 9); do
            var="COPILOT_PAT_${i}"
            if [ -n "${!var}" ]; then
              response="$RUNNER_TEMP/copilot-pat-${i}.json"
              if ! status=$(curl --silent --write-out '%{http_code}' \
                --header "Authorization: Bearer ${!var}" \
                --header "Accept: application/vnd.github+json" \
                --output "$response" \
                https://api.github.com/repos/dotnet/runtime); then
                status=000
              fi
              if [ "$status" = 200 ] && jq -e '.permissions.push == true' "$response" > /dev/null; then
                echo "copilot_pat_number=${i}" >> "$GITHUB_OUTPUT"
                rm -f "$response"
                exit 0
              fi
              rm -f "$response"
            fi
          done
          echo "::error::No writable Copilot PAT is available."
          exit 1

  probe:
    needs: pat_pool
    if: github.repository == 'dotnet/runtime' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    environment: copilot-pat-pool
    permissions:
      issues: write
      pull-requests: read
      statuses: write
    steps:
      - name: Probe eval reporting permissions
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          github-token: >-
            ${{
              case(
                needs.pat_pool.outputs.pat_number == '0', secrets.COPILOT_PAT_0,
                needs.pat_pool.outputs.pat_number == '1', secrets.COPILOT_PAT_1,
                needs.pat_pool.outputs.pat_number == '2', secrets.COPILOT_PAT_2,
                needs.pat_pool.outputs.pat_number == '3', secrets.COPILOT_PAT_3,
                needs.pat_pool.outputs.pat_number == '4', secrets.COPILOT_PAT_4,
                needs.pat_pool.outputs.pat_number == '5', secrets.COPILOT_PAT_5,
                needs.pat_pool.outputs.pat_number == '6', secrets.COPILOT_PAT_6,
                needs.pat_pool.outputs.pat_number == '7', secrets.COPILOT_PAT_7,
                needs.pat_pool.outputs.pat_number == '8', secrets.COPILOT_PAT_8,
                needs.pat_pool.outputs.pat_number == '9', secrets.COPILOT_PAT_9,
                secrets.COPILOT_GITHUB_TOKEN)
            }}
          script: |
            const { owner, repo } = context.repo;
            const pull_number = context.payload.pull_request.number;
            const sha = context.payload.pull_request.head.sha;
            const marker = '<!-- ci-workflow-eval-pr-probe -->';
            const body = `${marker}\n` +
              '> [!NOTE]\n' +
              '> The CI workflow eval reporting probe created this comment, reaction, and PR-head status.\n\n' +
              `Probe run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createCommitStatus({
              owner, repo, sha, state: 'pending',
              context: 'ci-workflow-eval-pr-probe',
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Testing eval report permissions',
            });
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner, repo, issue_number: pull_number, per_page: 100,
            });
            const existing = comments.find(comment => comment.body?.includes(marker));
            const comment = existing ?
              await github.rest.issues.updateComment({
                owner, repo, comment_id: existing.id, body,
              }) :
              await github.rest.issues.createComment({
                owner, repo, issue_number: pull_number, body,
              });
            await github.rest.reactions.createForIssueComment({
              owner, repo, comment_id: comment.data.id, content: 'eyes',
            });
            await github.rest.repos.createCommitStatus({
              owner, repo, sha, state: 'success',
              context: 'ci-workflow-eval-pr-probe',
              target_url: `${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`,
              description: 'Eval report permissions are working',
            });
