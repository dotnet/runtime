name: Holistic Review Completed

on:
  workflow_call:
    inputs:
      pr_number:
        description: 'Pull request number reviewed by the worker.'
        required: true
        type: string
      head_sha:
        description: 'Pull request head commit assessed by the worker.'
        required: true
        type: string
      outcome:
        description: 'One of: review-submitted, assessment-unchanged, or no-actionable-feedback.'
        required: true
        type: string

permissions: {}

jobs:
  get-state-issue:
    if: ${{ !github.event.repository.fork }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      state_issue_number: ${{ steps.get.outputs.state_issue_number }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Get pull request state issue
        id: get
        env:
          CREATE_STATE_ISSUE: 'false'
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: bash .github/workflows/scripts/holistic-review/orchestrator-get-state-issue.sh
  reconcile-state:
    needs: get-state-issue
    if: ${{ needs.get-state-issue.outputs.state_issue_number != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      state_updates: ${{ steps.reconcile.outputs.state_updates }}
    permissions:
      contents: read
      issues: read
      pull-requests: read
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Reconcile completed review
        id: reconcile
        env:
          GH_TOKEN: ${{ github.token }}
          # Reusable workflows retain the worker's event context. Bind state to that
          # context rather than trusting the agent-controlled callback payload.
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          HEAD_SHA: ${{ github.event.inputs.pr_head_sha }}
          OUTCOME: ${{ inputs.outcome }}
          STATE_ISSUE_NUMBER: ${{ needs.get-state-issue.outputs.state_issue_number }}
        shell: bash
        run: bash .github/workflows/scripts/holistic-review/orchestrator-reconcile-state.sh
  upsert-state:
    needs: [get-state-issue, reconcile-state]
    if: ${{ always() && needs.get-state-issue.result == 'success' && needs.get-state-issue.outputs.state_issue_number != '' && needs.reconcile-state.result == 'success' }}
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      issues: write
      pull-requests: read
    strategy:
      fail-fast: false
      max-parallel: 1
      matrix: ${{ fromJSON(needs.reconcile-state.outputs.state_updates || '{"include":[]}') }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - name: Upsert pull request state comment
        env:
          GH_TOKEN: ${{ github.token }}
          STATE_ISSUE_NUMBER: ${{ needs.get-state-issue.outputs.state_issue_number }}
          PR_NUMBER: ${{ matrix.pr_number }}
          PR_TITLE: ${{ matrix.title }}
          STATE_JSON: ${{ toJSON(matrix.state) }}
        shell: bash
        run: bash .github/workflows/scripts/holistic-review/orchestrator-upsert-state.sh
