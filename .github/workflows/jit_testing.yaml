name: JIT Testing Pipeline

on:
  push:
    branches:
      - ppc64le_coreclr_jit
  pull_request:
    branches:
      - ppc64le_coreclr_jit
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"

concurrency:
  group: jit-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jit-testing:
    runs-on: ubuntu-24.04-ppc64le-p10

    steps:
      # ======================================
      # Ensure correct branch
      # ======================================
      - name: Fail if not correct branch
        if: github.ref != 'refs/heads/ppc64le_coreclr_jit'
        run: |
          echo "This workflow is only allowed on ppc64le_coreclr_jit branch"
          exit 1

      # ======================================
      # Checkout
      # ======================================
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ======================================
      # Clean old container
      # ======================================
      - name: Stop and Remove Existing Container
        run: docker rm -f gha 2>/dev/null || true
        continue-on-error: true

      # ======================================
      # Start container
      # ======================================
      - name: Start Container
        run: |
          docker run -dit \
            --privileged \
            -v /sys/fs/cgroup:/sys/fs/cgroup:ro \
            --network host \
            --name gha \
            ubuntu:22.04

      # ======================================
      # Copy script
      # ======================================
      - name: Copy Script
        run: |
          docker cp .github/workflows/jit_testing.sh gha:/jit_testing.sh
          docker exec gha chmod +x /jit_testing.sh

      # ======================================
      # INSTALL + SETUP (runs once)
      # ======================================
      - name: Setup Environment
        run: |
          docker exec gha bash -c "
            set -euo pipefail
            /jit_testing.sh setup | tee /tmp/setup.log
             exit ${PIPESTATUS[0]}
          "

      # ======================================
      # BUILD STAGES
      # ======================================
      - name: Build Runtime
        run: |
          docker exec gha bash -c "
            set -euo pipefail
            /jit_testing.sh build_runtime | tee /tmp/build_runtime.log
             exit ${PIPESTATUS[0]}
          "

      - name: Build Libraries
        run: |
          docker exec gha bash -c "
            set -euo pipefail
            /jit_testing.sh build_libs | tee /tmp/build_libs.log
             exit ${PIPESTATUS[0]}
          "

      - name: Build Tests
        run: |
          docker exec gha bash -c "
            set -euo pipefail
            /jit_testing.sh build_tests | tee /tmp/build_tests.log
             exit ${PIPESTATUS[0]}
          "

      # ======================================
      # TEST STAGE
      # ======================================
      - name: Run JIT Tests
        run: |
          docker exec gha bash -c "
            set -euo pipefail
            /jit_testing.sh run_tests | tee /tmp/jit_tests.log
            exit ${PIPESTATUS[0]}
          "

      # ======================================
      # COPY LOGS
      # ======================================
      - name: Copy Logs
        if: always()
        run: |
          docker cp gha:/tmp ./logs 2>/dev/null || echo "No logs found"
        continue-on-error: true

      # ======================================
      # UPLOAD LOGS
      # ======================================
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-logs-${{ github.run_number }}
          path: logs/
          retention-days: 7

      # ======================================
      # CLEANUP
      # ======================================
      - name: Cleanup Container
        if: always()
        run: |
          docker stop gha 2>/dev/null || true
          docker rm gha 2>/dev/null || true
        continue-on-error: true
