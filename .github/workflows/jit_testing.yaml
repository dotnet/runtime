name: JIT Testing Pipeline

on:
  push:
    branches:
      - ppc64le_coreclr_jit
      - main   # optional (if you want to test failure on main)
  pull_request:
    branches:
      - ppc64le_coreclr_jit
  workflow_dispatch:
  schedule:
    - cron: "20 0 * * *"

concurrency:
  group: jit-testing-${{ github.ref }}
  cancel-in-progress: true

jobs:
  jit-testing:
    runs-on: ubuntu-24.04-ppc64le-p10

    steps:
     
      - name: Fail if not correct branch
        if: github.ref != 'refs/heads/ppc64le_coreclr_jit'
        run: |
          echo "This workflow is only allowed on ppc64le_coreclr_jit branch"
          exit 1

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Stop and Remove Existing Container
        run: |
          docker rm -f gha 2>/dev/null || true
        continue-on-error: true

      - name: Start Container
        run: |
          docker run -dit \
            --privileged \
            -v /sys/fs/cgroup:/sys/fs/cgroup:ro \
            --network host \
            --name gha \
            ubuntu:22.04

      - name: Copy Script
        run: |
          docker cp .github/workflows/jit_testing.sh gha:/jit_testing.sh
          docker exec gha chmod +x /jit_testing.sh

      - name: Run Build + Test
        run: |
          docker exec gha bash -c "/jit_testing.sh | tee /tmp/jit.log"

      - name: Copy Logs
        if: always()
        run: |
          docker cp gha:/tmp/jit.log ./jit.log 2>/dev/null || echo "No log file found"
        continue-on-error: true

      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-log-${{ github.run_number }}
          path: |
            jit.log
            **/build.log
          retention-days: 7

      - name: Cleanup Container
        if: always()
        run: |
          docker stop gha 2>/dev/null || true
          docker rm gha 2>/dev/null || true
        continue-on-error: true
