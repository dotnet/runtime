name: JIT Testing Pipeline

on:
  push:
    branches:
      - '**'        # runs on every commit to any branch
  workflow_dispatch:

jobs:
  jit-testing:
    runs-on: ubuntu-24.04-ppc64le-p10
    timeout-minutes: 180

    steps:
      #  Checkout repo
      - name: Checkout Repository
        uses: actions/checkout@v4

      #  Create working directory
      - name: Create Working Directory
        run: mkdir -p /tmp/jit_testing

      #  Copy script
      - name: Copy JIT Testing Script
        run: cp .github/workflows/jit_testing.sh /tmp/jit_testing/

      #  Make executable
      - name: Make Script Executable
        run: chmod +x /tmp/jit_testing/jit_testing.sh

      #  Run script
      - name: Execute JIT Testing Script
        run: |
          cd /tmp/jit_testing
          ./jit_testing.sh | tee jit.log

      #  Upload logs
      - name: Upload Logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jit-logs-${{ github.run_number }}
          path: /tmp/jit_testing/jit.log
          retention-days: 7
