name: ci-workflow-eval

on:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: read
  issues: write

concurrency:
  group: ci-workflow-eval-${{ github.event.issue.number }}
  cancel-in-progress: true

jobs:
  eval:
    if: >-
      github.repository == 'dotnet/runtime' &&
      github.event.issue.pull_request &&
      contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) &&
      (
        startsWith(github.event.comment.body, '/ci-scan eval') ||
        startsWith(github.event.comment.body, '/ci-fix eval') ||
        startsWith(github.event.comment.body, '/ci-feedback eval') ||
        startsWith(github.event.comment.body, '/ci-eval')
      )
    runs-on: ubuntu-latest
    steps:
      - name: Acknowledge the command
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'eyes',
            });

      - name: Select the spec(s) from the command
        id: sel
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          base=.github/workflows/evals
          case "$COMMENT_BODY" in
            "/ci-scan eval"*)     specs="$base/ci-failure-scan.eval.yaml" ;;
            "/ci-fix eval"*)      specs="$base/ci-failure-fix.eval.yaml" ;;
            "/ci-feedback eval"*) specs="$base/ci-failure-scan-feedback.eval.yaml" ;;
            "/ci-eval"*)          specs="$base/ci-failure-scan.eval.yaml $base/ci-failure-fix.eval.yaml $base/ci-failure-scan-feedback.eval.yaml" ;;
            *)                    specs="" ;;
          esac
          echo "specs=$specs" >> "$GITHUB_OUTPUT"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check out the PR head
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh pr checkout ${{ github.event.issue.number }}

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - run: npm install -g @microsoft/vally-cli

      - name: Lint the selected spec(s)
        run: |
          for spec in ${{ steps.sel.outputs.specs }}; do
            vally lint --eval-spec "$spec" --strict
          done

      - name: Guard on eval token
        id: guard
        run: |
          if [ -z "${{ secrets.COPILOT_GITHUB_TOKEN }}" ]; then
            echo "run=false" >> "$GITHUB_OUTPUT"
            echo "::notice::COPILOT_GITHUB_TOKEN not set — skipping the Vally eval run."
          else
            echo "run=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Run the eval(s)
        if: steps.guard.outputs.run == 'true'
        id: run
        env:
          COPILOT_GITHUB_TOKEN: ${{ secrets.COPILOT_GITHUB_TOKEN }}
        run: |
          : > report.md
          rc=0
          for spec in ${{ steps.sel.outputs.specs }}; do
            name="$(basename "$spec" .eval.yaml)"
            echo "## $name" >> report.md
            if vally eval --eval-spec "$spec" --skill-dir .github/workflows \
                 --workspace "./ws-$name" --output-dir "./out-$name" > "log-$name.txt" 2>&1; then
              echo "✅ passed" >> report.md
            else
              rc=1
              echo "❌ failed" >> report.md
            fi
            md="$(ls -t ./out-$name/*/eval-results.md 2>/dev/null | head -1 || true)"
            if [ -n "$md" ]; then { echo; echo '<details><summary>details</summary>'; echo; cat "$md"; echo; echo '</details>'; } >> report.md; fi
            echo >> report.md
          done
          exit $rc

      - name: Post the report
        if: always() && steps.guard.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let body = '_eval report unavailable_';
            try { body = fs.readFileSync('report.md', 'utf8'); } catch {}
            const marker = '<!-- ci-workflow-eval -->';
            const header = '> [!NOTE]\n> AI/Copilot-generated eval report (Vally), triggered by a maintainer eval command.\n\n';
            const out = `${marker}\n${header}${body}`;
            const { owner, repo } = context.repo;
            const issue_number = context.issue.number;
            const comments = await github.paginate(github.rest.issues.listComments, { owner, repo, issue_number, per_page: 100 });
            const existing = comments.find(c => c.body && c.body.includes(marker));
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body: out });
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body: out });
            }
