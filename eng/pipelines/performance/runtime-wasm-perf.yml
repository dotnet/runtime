# This is a wrapper yml for `perf-wasm-jobs`, which has all the perf related
# wasm jobs. This file is essentially so we can point the pipeline in azdo
# UI to this, and thus avoid any scheduled triggers

trigger: none

# Disabled: the perf wasm v8 job installs V8 via jsvu, and the V8 binary it currently
# installs does not support exnref yet, so the MicroBenchmarks Helix
# job aborts at startup. Re-enable once an exnref-capable V8 is pinned. See
# ActiveIssue https://github.com/dotnet/runtime/issues/129849
pr: none

resources:
  repositories:
    - repository: performance
      type: github
      name: dotnet/performance
      endpoint: public

variables:
  - template: /eng/pipelines/common/variables.yml

extends:
  template:  /eng/pipelines/common/templates/pipeline-with-resources.yml
  parameters:
    stages:
    - stage: Build
      jobs:
      - template: /eng/pipelines/runtime-wasm-perf-jobs.yml@performance
        parameters:
          runtimeRepoAlias: self
          performanceRepoAlias: performance
          runProfile: 'v8'
          jobParameters:
            onlySanityCheck: true
          #downloadSpecificBuild:
            #buildId: '1878694'
            #pipeline: 'perf-wasm'
            #branchName: 'refs/pull/72119/head'
