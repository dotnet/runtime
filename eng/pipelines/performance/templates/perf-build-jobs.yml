parameters:
  perfBranch: 'main' # Currently only used for building the BDN App
  jobsAndPlatforms: [
    'coreclr:linux_x64', 'coreclr:windows_x64', 'coreclr:windows_x86', 'coreclr:linux_musl_x64',
    'monoAot:linux_x64',
    'monoAndroid:android_arm64',
    'mono:linux_x64',
    'monoPacks:android_arm64',
    'perfBDNApp:ios_arm64'
  ]

jobs:
  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'coreclr:') }}:
    # build coreclr and libraries
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'coreclr:' | select 'split', ':', 1 }}
        jobParameters:
          nameSuffix: coreclr
          buildArgs: -s clr+libs+host+packs -c $(_BuildConfig)
          isOfficialBuild: false
          postBuildSteps:
          - template: /eng/pipelines/common/upload-artifact-step.yml
            parameters:
              rootFolder: $(Build.SourcesDirectory)/artifacts/bin
              includeRootFolder: false
              archiveType: $(archiveType)
              archiveExtension: $(archiveExtension)
              tarCompression: $(tarCompression)
              artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
              displayName: Build Assets

  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'monoAot:') }}:
    # build mono for AOT
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        runtimeFlavor: mono
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'monoAot:' | select 'split', ':', 1 }}
        jobParameters:
          buildArgs: -s mono+libs+host+packs -c $(_BuildConfig) /p:MonoAOTEnableLLVM=true /p:MonoEnableLLVM=true /p:BuildMonoAOTCrossCompiler=true /p:AotHostArchitecture=x64 /p:AotHostOS=linux
          nameSuffix: AOT
          isOfficialBuild: false
          postBuildSteps:
            - template: /eng/pipelines/common/upload-artifact-step.yml
              parameters:
                rootFolder: '$(Build.SourcesDirectory)/artifacts/'
                includeRootFolder: true
                displayName: AOT Mono Artifacts
                artifactName: LinuxMonoAOTx64
                archiveExtension: '.tar.gz'
                archiveType: tar
                tarCompression: gz

  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'monoAndroid:') }}:
    # build mono Android scenarios
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        runtimeFlavor: mono
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'monoAndroid:' | select 'split', ':', 1 }}
        jobParameters:
          buildArgs: -s mono+libs+host+packs -c $(_BuildConfig)
          nameSuffix: AndroidMono
          isOfficialBuild: false
          postBuildSteps:
            - template: /eng/pipelines/performance/templates/build-perf-sample-apps.yml
              parameters:
                rootFolder: '$(Build.SourcesDirectory)/artifacts/'
                includeRootFolder: true
                displayName: Android Mono Artifacts
                artifactName: AndroidMonoarm64
                archiveExtension: '.tar.gz'
                archiveType: tar
                tarCompression: gz

  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'mono:') }}:
    # build mono
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        runtimeFlavor: mono
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'mono:' | select 'split', ':', 1 }}
        jobParameters:
          nameSuffix: mono
          buildArgs: -s mono+clr.iltools+clr.hosts+libs+host+packs -c $(_BuildConfig)
          isOfficialBuild: false
          postBuildSteps:
          - template: /eng/pipelines/common/upload-artifact-step.yml
            parameters:
              rootFolder: $(Build.SourcesDirectory)/artifacts/bin
              includeRootFolder: false
              archiveType: $(archiveType)
              archiveExtension: $(archiveExtension)
              tarCompression: $(tarCompression)
              artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_mono
              displayName: Build Assets

  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'monoPacks:') }}:
    # build mono runtime packs
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        runtimeFlavor: mono
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'monoPacks:' | select 'split', ':', 1 }}
        jobParameters:
          buildArgs: -s mono+libs+host+packs -c $(_BuildConfig)
          nameSuffix: Mono_Packs
          isOfficialBuild: false
          postBuildSteps:
            - template: /eng/pipelines/common/upload-intermediate-artifacts-step.yml
              parameters:
                name: MonoRuntimePacks
                isOfficialBuild: false

  - ${{ if any(parameters.jobsAndPlatforms, 'startsWith', 'perfBDNApp:') }}:
    # build PerfBDN app
    - template: /eng/pipelines/common/platform-matrix.yml
      parameters:
        jobTemplate: /eng/pipelines/common/global-build-job.yml
        buildConfig: release
        runtimeFlavor: mono
        platforms: ${{ parameters.jobsAndPlatforms | where 'startsWith', 'perfBDNApp:' | select 'split', ':', 1 }}
        jobParameters:
          dependsOn:
           - Build_android_arm64_release_Mono_Packs
          buildArgs: -s mono -c $(_BuildConfig)
          nameSuffix: PerfBDNApp
          isOfficialBuild: false
          pool:
            vmImage: 'macos-13'
          postBuildSteps:
            - template: /eng/pipelines/performance/templates/build-perf-bdn-app.yml
              parameters:
                rootFolder: '$(Build.SourcesDirectory)/artifacts/'
                includeRootFolder: true
                displayName: Android BDN App Artifacts
                artifactName: PerfBDNAppArm
                archiveExtension: '.tar.gz'
                archiveType: tar
                tarCompression: gz
                perfBranch: ${{ parameters.perfBranch }}
