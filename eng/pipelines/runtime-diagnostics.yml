trigger: none

parameters:
- name: diagnosticsBranch
  displayName: Diagnostics Branch
  type: string
  default: main
- name: cdacDumpPlatforms
  displayName: cDAC Dump Platforms
  type: object
  default:
    - windows_x64
    - windows_x86
    - linux_x64
    - windows_arm64
    - linux_arm64
    - linux_arm
    - osx_arm64
    - osx_x64
# osx_arm64 / osx_x64 are intentionally excluded from x-plat coverage.
# Their dump payloads are large enough that downloading every platform's dumps
# onto a single Helix host exceeds available disk space.
- name: cdacXPlatDumpPlatforms
  displayName: cDAC X-Plat Dump Platforms
  type: object
  default:
    - windows_x64
    - windows_x86
    - linux_x64
    - windows_arm64
    - linux_arm64
    - linux_arm
- name: cdacDumpTestMode
  displayName: cDAC Dump Test Mode
  type: string
  default: single-leg
  values:
    - single-leg
    - xplat
- name: cdacStressPlatforms
  displayName: cDAC Stress Test Platforms
  type: object
  default:
    - windows_x64
    - linux_x64
    - windows_arm64
    - linux_arm64

resources:
  repositories:
    - repository: diagnostics
      type: github
      endpoint: public
      name: dotnet/diagnostics
      ref:  ${{ parameters.diagnosticsBranch }}

variables:
  - template: /eng/pipelines/common/variables.yml
  - template: /eng/pipelines/helix-platforms.yml

schedules:
- cron: "30 2 * * *"
  displayName: Every night at 2:30AM
  branches:
    include:
    - main
  always: true

pr:
  branches:
    include:
    - main
  paths:
    include:
    - eng/pipelines/**
    - src/native/managed/cdac/**
    - src/coreclr/debug/runtimeinfo/**

extends:
  template:  /eng/pipelines/common/templates/pipeline-with-resources.yml
  parameters:
    stages:
    - stage: Build
      jobs:
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: release
          platforms:
          - windows_x64
          jobParameters:
            # Pass -clrinterpreter so FEATURE_INTERPRETER is compiled into the Release
            # CoreCLR. This lets the Interpreter SOS leg below share a single build with
            # the cDAC/cDAC_no_fallback/DAC legs instead of producing a separate Checked
            # drop. (Note from review on dotnet/runtime#127840: -clrinterpreter enables
            # the interpreter in Release as well.)
            buildArgs: -s clr+libs+tools.cdac+host+packs -c Debug -rc $(_BuildConfig) -lc $(_BuildConfig) -clrinterpreter
            nameSuffix: AllSubsets_CoreCLR
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            timeoutInMinutes: 360
            postBuildSteps:
            - powershell: |
                $versionDir = Get-ChildItem -Directory -Path "$(Build.SourcesDirectory)\artifacts\bin\testhost\net*\shared\Microsoft.NETCore.App" | Select-Object -ExpandProperty FullName
                Write-Host "##vso[task.setvariable variable=versionDir]$versionDir"
              displayName: 'Set Path to Shared Framework Artifacts'
            - template: /eng/pipelines/common/upload-artifact-step.yml
              parameters:
                rootFolder: $(versionDir)
                includeRootFolder: false
                archiveType: $(archiveType)
                archiveExtension: $(archiveExtension)
                tarCompression: $(tarCompression)
                artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
                displayName: Build Assets
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/diagnostics/runtime-diag-job.yml
          buildConfig: release
          platforms:
          - windows_x64
          # Workaround: microsoft/azure-pipelines-tasks#21871
          # PublishTestResults v2.270.0 garbles parameterized xUnit test names containing dots.
          # Unsetting this feature flag restores v2.262.0 behavior until a permanent fix ships.
          variables:
            - name: AllowPtrToDetectTestRunRetryFiles
              value: false
          jobParameters:
            name: cDAC
            useCdac: true
            testInterpreter: true
            methodFilter: SOS*
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            liveRuntimeDir: $(Build.SourcesDirectory)/artifacts/runtime
            timeoutInMinutes: 360
            dependsOn:
            - build_windows_x64_release_AllSubsets_CoreCLR
            preBuildSteps:
              - template: /eng/pipelines/common/download-artifact-step.yml
                parameters:
                  artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
                  artifactFileName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr$(archiveExtension)
                  unpackFolder: $(Build.SourcesDirectory)/artifacts/runtime
                  displayName: 'Runtime Build Artifacts'
            postBuildSteps:
            - task: PublishTestResults@2
              inputs:
                testResultsFormat: xUnit
                testResultsFiles: '**/*.xml'
                searchFolder: '$(Build.SourcesDirectory)/artifacts/TestResults'
                testRunTitle: 'Tests $(_PhaseName)'
                failTaskOnFailedTests: true
                publishRunAttachments: true
                mergeTestResults: true
                buildConfiguration: $(_BuildConfig)
              continueOnError: true
              condition: always()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/tmp/$(_BuildConfig)/dumps'
                artifactName: 'Dumps_cDAC_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Crash Dumps'
              continueOnError: true
              condition: failed()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/TestResults'
                artifactName: 'TestResults_cDAC_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Test Results and SOS Logs'
              continueOnError: true
              condition: failed()
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/diagnostics/runtime-diag-job.yml
          buildConfig: release
          platforms:
          - windows_x64
          # Workaround: microsoft/azure-pipelines-tasks#21871
          variables:
            - name: AllowPtrToDetectTestRunRetryFiles
              value: false
          jobParameters:
            name: cDAC_no_fallback
            useCdac: true
            noFallback: true
            testInterpreter: true
            methodFilter: SOS*
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            liveRuntimeDir: $(Build.SourcesDirectory)/artifacts/runtime
            timeoutInMinutes: 360
            dependsOn:
            - build_windows_x64_release_AllSubsets_CoreCLR
            preBuildSteps:
              - template: /eng/pipelines/common/download-artifact-step.yml
                parameters:
                  artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
                  artifactFileName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr$(archiveExtension)
                  unpackFolder: $(Build.SourcesDirectory)/artifacts/runtime
                  displayName: 'Runtime Build Artifacts'
            postBuildSteps:
            - task: PublishTestResults@2
              inputs:
                testResultsFormat: xUnit
                testResultsFiles: '**/*.xml'
                searchFolder: '$(Build.SourcesDirectory)/artifacts/TestResults'
                testRunTitle: 'Tests $(_PhaseName)'
                failTaskOnFailedTests: true
                publishRunAttachments: true
                mergeTestResults: true
                buildConfiguration: $(_BuildConfig)
              continueOnError: true
              condition: always()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/tmp/$(_BuildConfig)/dumps'
                artifactName: 'Dumps_cDAC_no_fallback_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Crash Dumps'
              continueOnError: true
              condition: failed()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/TestResults'
                artifactName: 'TestResults_cDAC_no_fallback_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Test Results and SOS Logs'
              continueOnError: true
              condition: failed()
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/diagnostics/runtime-diag-job.yml
          buildConfig: release
          platforms:
          - windows_x64
          # Workaround: microsoft/azure-pipelines-tasks#21871
          variables:
            - name: AllowPtrToDetectTestRunRetryFiles
              value: false
          jobParameters:
            name: DAC
            useCdac: false
            testInterpreter: true
            methodFilter: SOS*
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            liveRuntimeDir: $(Build.SourcesDirectory)/artifacts/runtime
            timeoutInMinutes: 360
            dependsOn:
            - build_windows_x64_release_AllSubsets_CoreCLR
            preBuildSteps:
              - template: /eng/pipelines/common/download-artifact-step.yml
                parameters:
                  artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
                  artifactFileName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr$(archiveExtension)
                  unpackFolder: $(Build.SourcesDirectory)/artifacts/runtime
                  displayName: 'Runtime Build Artifacts'
            postBuildSteps:
            - task: PublishTestResults@2
              inputs:
                testResultsFormat: xUnit
                testResultsFiles: '**/*.xml'
                searchFolder: '$(Build.SourcesDirectory)/artifacts/TestResults'
                testRunTitle: 'Tests $(_PhaseName)'
                failTaskOnFailedTests: true
                publishRunAttachments: true
                mergeTestResults: true
                buildConfiguration: $(_BuildConfig)
              continueOnError: true
              condition: always()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/tmp/$(_BuildConfig)/dumps'
                artifactName: 'Dumps_DAC_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Crash Dumps'
              continueOnError: true
              condition: failed()
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(Build.SourcesDirectory)/artifacts/TestResults'
                artifactName: 'TestResults_DAC_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish Test Results and SOS Logs'
              continueOnError: true
              condition: failed()

    #
    # cDAC Shared Build — One coreclr+libs build per platform, consumed by
    # both CdacDumpTests and CdacStressTests (and the X-plat dump stages)
    # so we don't rebuild coreclr per test leg. Runtime is built Checked;
    # cDAC native shim ships in the Release testhost (used by stress tests
    # in-process); dump tests will rebuild the cDAC managed assemblies at
    # /p:Configuration=Debug during payload prep.
    #
    - ${{ if ne(variables['Build.Reason'], 'Schedule') }}:
      - stage: CdacBuild
        dependsOn: []
        jobs:
        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            buildConfig: release
            platforms: ${{ parameters.cdacDumpPlatforms }}
            jobParameters:
              nameSuffix: CdacBuild
              buildArgs: -s clr+libs+tools.cdac+tools.cdacdumptests+tools.cdacstresstests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig) /p:SkipDumpVersions=net10.0
              isOfficialBuild: ${{ variables.isOfficialBuild }}
              timeoutInMinutes: 180
              postBuildSteps:
              - template: /eng/pipelines/common/upload-artifact-step.yml
                parameters:
                  rootFolder: $(Build.SourcesDirectory)/artifacts/bin
                  includeRootFolder: false
                  archiveType: $(archiveType)
                  archiveExtension: $(archiveExtension)
                  tarCompression: $(tarCompression)
                  artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                  displayName: cDAC Shared Build Artifacts

    #
    # cDAC Dump Tests — Build, generate dumps, and run tests on Helix (single-leg mode)
    #
    - ${{ if and(eq(parameters.cdacDumpTestMode, 'single-leg'), ne(variables['Build.Reason'], 'Schedule')) }}:
      - stage: CdacDumpTests
        dependsOn:
        - CdacBuild
        jobs:
        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            buildConfig: release
            platforms: ${{ parameters.cdacDumpPlatforms }}
            shouldContinueOnError: true
            jobParameters:
              nameSuffix: CdacDumpTest
              # Tiny rebuild that triggers .dotnet init; coreclr+libs+tools.cdac
              # come from CdacBuildArtifacts. prepare-cdac-helix-steps below
              # rebuilds the cDAC managed assemblies at Debug for the dump tests.
              buildArgs: -s tools.cdacdumptests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig) /p:SkipDumpVersions=net10.0
              timeoutInMinutes: 180
              dependsOnGlobalBuilds:
              - nameSuffix: CdacBuild
              preBuildSteps:
                - template: /eng/pipelines/common/download-artifact-step.yml
                  parameters:
                    artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                    artifactFileName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)$(archiveExtension)
                    unpackFolder: $(Build.SourcesDirectory)/artifacts/bin
                    displayName: 'cDAC Shared Build Artifacts'
              postBuildSteps:
              - template: /eng/pipelines/cdac/prepare-cdac-helix-steps.yml
                parameters:
                  cdacTestConfig: Debug
              - template: /eng/pipelines/common/templates/runtimes/send-to-helix-inner-step.yml
                parameters:
                  displayName: 'Send cDAC Dump Tests to Helix'
                  sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:DumpTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac /bl:$(Build.SourcesDirectory)/artifacts/log/SendToHelix.binlog
                  environment:
                    _Creator: dotnet-bot
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                    NUGET_PACKAGES: $(Build.SourcesDirectory)$(dir).packages
              - task: PublishPipelineArtifact@1
                inputs:
                  targetPath: $(Build.SourcesDirectory)/artifacts/helixresults
                  artifactName: CdacDumps_$(osGroup)_$(archType)
                displayName: 'Publish Dump Artifacts'
                condition: and(always(), ne(variables['Agent.JobStatus'], 'Succeeded'))
                continueOnError: true
              - pwsh: |
                  if ("$(Agent.JobStatus)" -ne "Succeeded") {
                    Write-Error "One or more cDAC dump test failures were detected. Failing the job."
                    exit 1
                  }
                displayName: 'Fail on test errors'
                condition: always()

    #
    # cDAC GC Stress Tests — runs in-process cDAC vs runtime stack-ref
    # verification at GC stress points. Independent stage with its own build
    # so its status/failures don't get conflated with the dump tests.
    #
    - ${{ if ne(variables['Build.Reason'], 'Schedule') }}:
      - stage: CdacStressTests
        dependsOn:
        - CdacBuild
        jobs:
        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            buildConfig: release
            platforms: ${{ parameters.cdacStressPlatforms }}
            shouldContinueOnError: true
            jobParameters:
              nameSuffix: CdacStressTest
              # Tiny rebuild that triggers .dotnet init; coreclr+libs+tools.cdac
              # come from CdacBuildArtifacts and aren't rebuilt.
              buildArgs: -s tools.cdacstresstests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig)
              timeoutInMinutes: 180
              dependsOnGlobalBuilds:
              - nameSuffix: CdacBuild
              preBuildSteps:
                - template: /eng/pipelines/common/download-artifact-step.yml
                  parameters:
                    artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                    artifactFileName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)$(archiveExtension)
                    unpackFolder: $(Build.SourcesDirectory)/artifacts/bin
                    displayName: 'cDAC Shared Build Artifacts'
              postBuildSteps:
              - template: /eng/pipelines/cdac/prepare-cdac-stress-helix-steps.yml
              - template: /eng/pipelines/common/templates/runtimes/send-to-helix-inner-step.yml
                parameters:
                  displayName: 'Send cDAC Stress Tests to Helix'
                  sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/StressTests/cdac-stress-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacStressHelixQueue)" /p:TestHostPayload=$(StressTestHostRootDir) /p:StressTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac-stress /bl:$(Build.SourcesDirectory)/artifacts/log/SendStressToHelix.binlog
                  environment:
                    _Creator: dotnet-bot
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                    NUGET_PACKAGES: $(Build.SourcesDirectory)$(dir).packages
              - pwsh: |
                  if ("$(Agent.JobStatus)" -ne "Succeeded") {
                    Write-Error "One or more cDAC stress test failures were detected. Failing the job."
                    exit 1
                  }
                displayName: 'Fail on test errors'
                condition: always()
              # On failure, publish the binaries needed to symbolicate the
              # core dumps Helix collects automatically. Without these the
              # dumps are unreadable -- libcoreclr.so, mscordaccore_universal,
              # corerun and their .dbg/.pdb side files are required.
              - task: PublishPipelineArtifact@1
                inputs:
                  targetPath: '$(StressTestHostRootDir)'
                  artifactName: 'TestHost_CdacStress_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
                displayName: 'Publish TestHost for crash dump symbolication'
                continueOnError: true
                condition: failed()

    #
    # cDAC X-Plat Dump Generation and Testing — Two-stage flow:
    # 1. Generate dumps on each platform via Helix, download and publish as artifacts
    # 2. Download all platforms' dumps and run tests on each target platform
    #
    - ${{ if or(eq(parameters.cdacDumpTestMode, 'xplat'), eq(variables['Build.Reason'], 'Schedule')) }}:
      - stage: CdacXPlatDumpGen
        dependsOn:
        - CdacBuild
        jobs:
        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            buildConfig: release
            platforms: ${{ parameters.cdacXPlatDumpPlatforms }}
            shouldContinueOnError: true
            jobParameters:
              nameSuffix: CdacXPlatDumpGen
              buildArgs: -s tools.cdacdumptests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig) /p:SkipDumpVersions=net10.0
              timeoutInMinutes: 180
              dependsOnGlobalBuilds:
              - nameSuffix: CdacBuild
              preBuildSteps:
                - template: /eng/pipelines/common/download-artifact-step.yml
                  parameters:
                    artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                    artifactFileName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)$(archiveExtension)
                    unpackFolder: $(Build.SourcesDirectory)/artifacts/bin
                    displayName: 'cDAC Shared Build Artifacts'
              postBuildSteps:
              - template: /eng/pipelines/cdac/prepare-cdac-helix-steps.yml
                parameters:
                  cdacTestConfig: Debug
              - template: /eng/pipelines/common/templates/runtimes/send-to-helix-inner-step.yml
                parameters:
                  displayName: 'Send cDAC Dump Gen to Helix'
                  sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-helix.proj /t:Test /p:DumpOnly=true /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:DumpTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac /bl:$(Build.SourcesDirectory)/artifacts/log/SendDumpGenToHelix.binlog
                  environment:
                    _Creator: dotnet-bot
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                    NUGET_PACKAGES: $(Build.SourcesDirectory)$(dir).packages
              # After Helix completes and DownloadFilesFromResults runs, publish the dump tar
              - pwsh: |
                  $resultsDir = "$(Build.SourcesDirectory)/artifacts/helixresults"
                  Write-Host "Helix results directory contents:"
                  if (Test-Path $resultsDir) {
                      Get-ChildItem -Recurse $resultsDir | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
                  } else {
                      Write-Host "  Directory not found: $resultsDir"
                  }
                displayName: 'List Helix Results'
              - task: PublishPipelineArtifact@1
                inputs:
                  targetPath: $(Build.SourcesDirectory)/artifacts/helixresults
                  artifactName: CdacDumps_$(osGroup)_$(archType)
                displayName: 'Publish Dump Artifacts'
              - pwsh: |
                  if ("$(Agent.JobStatus)" -ne "Succeeded") {
                    Write-Error "One or more cDAC dump generation failures were detected. Failing the job."
                    exit 1
                  }
                displayName: 'Fail on dump generation errors'
                condition: always()

      - stage: CdacXPlatDumpTests
        dependsOn:
        - CdacBuild
        - CdacXPlatDumpGen
        jobs:
        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            buildConfig: release
            platforms: ${{ parameters.cdacXPlatDumpPlatforms }}
            shouldContinueOnError: true
            jobParameters:
              nameSuffix: CdacXPlatDumpTest
              buildArgs: -s tools.cdacdumptests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig) /p:SkipDumpVersions=net10.0
              timeoutInMinutes: 180
              dependsOnGlobalBuilds:
              - nameSuffix: CdacBuild
              preBuildSteps:
                - template: /eng/pipelines/common/download-artifact-step.yml
                  parameters:
                    artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                    artifactFileName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)$(archiveExtension)
                    unpackFolder: $(Build.SourcesDirectory)/artifacts/bin
                    displayName: 'cDAC Shared Build Artifacts'
              postBuildSteps:
              - template: /eng/pipelines/cdac/prepare-cdac-helix-steps.yml
                parameters:
                  buildDebuggees: false
                  skipDebuggeeCopy: true
                  cdacTestConfig: Debug
                parameters:
                  buildDebuggees: false
                  skipDebuggeeCopy: true
              # Download dump artifacts from all source platforms
              - ${{ each platform in parameters.cdacXPlatDumpPlatforms }}:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifactName: CdacDumps_${{ platform }}
                    targetPath: $(Build.SourcesDirectory)/artifacts/xplatDumps/${{ platform }}
                  displayName: 'Download dumps from ${{ platform }}'
              # Extract dump tars into the Helix payload
              - pwsh: |
                  $platforms = "${{ join(';', parameters.cdacXPlatDumpPlatforms) }}".Split(';')
                  $payloadDumpsDir = "$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/dumps"
                  foreach ($platform in $platforms) {
                      $downloadDir = "$(Build.SourcesDirectory)/artifacts/xplatDumps/$platform"
                      $tarFile = Get-ChildItem -Recurse -Filter "dumps.tar.gz" -Path $downloadDir | Select-Object -First 1 -ExpandProperty FullName
                      if (-not $tarFile) {
                          Write-Error "No dumps.tar.gz found for platform $platform in $downloadDir"
                          exit 1
                      }
                      $destDir = Join-Path $payloadDumpsDir $platform
                      New-Item -ItemType Directory -Force -Path $destDir | Out-Null
                      Write-Host "Extracting $tarFile to $destDir"
                      tar -xzf "$tarFile" -C "$destDir"
                  }
                  Write-Host "Dump payload contents:"
                  Get-ChildItem -Recurse $payloadDumpsDir -Filter "*.dmp" | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
                displayName: 'Extract Dump Artifacts into Payload'
              - template: /eng/pipelines/common/templates/runtimes/send-to-helix-inner-step.yml
                parameters:
                  displayName: 'Send cDAC X-Plat Dump Tests to Helix'
                  sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-xplat-test-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:TestPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/tests /p:DumpPayloadBase=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/dumps /bl:$(Build.SourcesDirectory)/artifacts/log/SendXPlatTestToHelix.binlog
                  environment:
                    _Creator: dotnet-bot
                    SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                    NUGET_PACKAGES: $(Build.SourcesDirectory)$(dir).packages
                    SourcePlatforms: ${{ join(';', parameters.cdacXPlatDumpPlatforms) }}
              - pwsh: |
                  if ("$(Agent.JobStatus)" -ne "Succeeded") {
                    Write-Error "One or more cDAC x-plat dump test failures were detected. Failing the job."
                    exit 1
                  }
                displayName: 'Fail on test errors'
                condition: always()
