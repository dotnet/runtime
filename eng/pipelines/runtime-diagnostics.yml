# runtime-diagnostics.yml
#
# Pipeline overview:
#
#   SOSTests           windows_x64 Release. One shared coreclr+libs build (-c Debug
#                      -rc release -lc release -clrinterpreter) consumed by 4 SOS
#                      legs that run on top of it: cDAC, cDAC_fallback, cDAC_verify, DAC.
#                      Each leg sets testInterpreter: true so interpreter coverage
#                      is exercised inline (no separate Interpreter leg).
#
#   CdacUnitTests      linux_x64 Debug. Builds + tests the cDAC managed-side
#                      UnitTests + DataGeneratorTests projects (tools.cdactests
#                      subset). Independent of every other stage.
#
#   CdacTests          Per-platform CdacBuild + per-platform Dump / Stress /
#                      XPlatDumpGen / XPlatDumpTest legs in one stage. Each
#                      test leg uses job-level dependsOnGlobalBuilds: CdacBuild,
#                      so e.g. linux_x64 dump tests start as soon as linux_x64
#                      CdacBuild finishes (no waiting on the slowest platform).
#                      The cross-platform XPlatDumpTest legs additionally
#                      depend on every source platform's XPlatDumpGen via
#                      explicit per-job dependsOn.
#                      Mode gating:
#                        CdacDumpTest       single-leg mode AND not Schedule
#                        CdacStressTest     always
#                        CdacXPlatDumpGen   xplat mode OR Schedule
#                        CdacXPlatDumpTest  xplat mode OR Schedule

trigger: none

parameters:
- name: diagnosticsBranch
  displayName: Diagnostics Branch
  type: string
  default: main
- name: cdacDumpPlatforms
  displayName: cDAC Dump Platforms
  type: object
  default:
    - windows_x64
    - windows_x86
    - linux_x64
    - windows_arm64
    - linux_arm64
    - linux_arm
    - osx_arm64
    - osx_x64
# osx_arm64 / osx_x64 are intentionally excluded from x-plat coverage.
# Their dump payloads are large enough that downloading every platform's dumps
# onto a single Helix host exceeds available disk space.
- name: cdacXPlatDumpPlatforms
  displayName: cDAC X-Plat Dump Platforms
  type: object
  default:
    - windows_x64
    - windows_x86
    - linux_x64
    - windows_arm64
    - linux_arm64
    - linux_arm
- name: cdacDumpTestMode
  displayName: cDAC Dump Test Mode
  type: string
  default: single-leg
  values:
    - single-leg
    - xplat
- name: cdacStressPlatforms
  displayName: cDAC Stress Test Platforms
  type: object
  default:
    - windows_x64
    - windows_x86
    - linux_x64
    - windows_arm64
    - linux_arm64
    - linux_arm

resources:
  repositories:
    - repository: diagnostics
      type: github
      endpoint: public
      name: dotnet/diagnostics
      ref:  ${{ parameters.diagnosticsBranch }}

variables:
  - template: /eng/pipelines/common/variables.yml
  - template: /eng/pipelines/helix-platforms.yml

schedules:
- cron: "30 2 * * *"
  displayName: Every night at 2:30AM
  branches:
    include:
    - main
  always: true

pr:
  branches:
    include:
    - main
  paths:
    include:
    - eng/pipelines/**
    - src/native/managed/cdac/**
    - src/coreclr/debug/runtimeinfo/**
    - src/coreclr/vm/cdacstress.cpp

extends:
  template:  /eng/pipelines/common/templates/pipeline-with-resources.yml
  parameters:
    stages:

    # ----------------------------------------------------------------------
    # SOS tests: shared windows_x64 build + 3 SOS legs that consume it.
    # ----------------------------------------------------------------------
    - stage: SOSTests
      jobs:
      # Shared coreclr+libs+host+packs build. -clrinterpreter compiles
      # FEATURE_INTERPRETER into the Release CoreCLR so the SOS legs below
      # (which all set testInterpreter: true via sos-test-leg.yml) get
      # interpreter coverage without needing a separate Checked drop
      # (see review on dotnet/runtime#127840 -- -clrinterpreter enables
      # the interpreter in Release too).
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: release
          platforms:
          - windows_x64
          jobParameters:
            buildArgs: -s clr+libs+tools.cdac+host+packs -c Debug -rc $(_BuildConfig) -lc $(_BuildConfig) -clrinterpreter
            nameSuffix: AllSubsets_CoreCLR
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            timeoutInMinutes: 360
            postBuildSteps:
            - powershell: |
                $versionDir = Get-ChildItem -Directory -Path "$(Build.SourcesDirectory)\artifacts\bin\testhost\net*\shared\Microsoft.NETCore.App" | Select-Object -ExpandProperty FullName
                Write-Host "##vso[task.setvariable variable=versionDir]$versionDir"
              displayName: 'Set Path to Shared Framework Artifacts'
            - template: /eng/pipelines/common/upload-artifact-step.yml
              parameters:
                rootFolder: $(versionDir)
                includeRootFolder: false
                archiveType: $(archiveType)
                archiveExtension: $(archiveExtension)
                tarCompression: $(tarCompression)
                artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_coreclr
                displayName: Build Assets
            # The cDAC (mscordaccore_universal) is built by tools.cdac but is not part of the shared
            # framework (testhost), so upload it separately for the cDAC-only SOS leg to consume.
            - powershell: |
                $cdacDir = Get-ChildItem -Directory -Path "$(Build.SourcesDirectory)\artifacts\bin\mscordaccore_universal\*\win-$(archType)\publish" | Select-Object -ExpandProperty FullName -First 1
                Write-Host "##vso[task.setvariable variable=cdacDir]$cdacDir"
              displayName: 'Set Path to cDAC Artifacts'
            - template: /eng/pipelines/common/upload-artifact-step.yml
              parameters:
                rootFolder: $(cdacDir)
                includeRootFolder: false
                archiveType: $(archiveType)
                archiveExtension: $(archiveExtension)
                tarCompression: $(tarCompression)
                artifactName: BuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_cdac
                displayName: cDAC Assets

      # SOS test legs: each depends on the shared build above. Differ only in
      # name (artifact namespace) and the cDAC/DAC load mode.

      # cDAC: the runtime-under-test's own standalone cDAC (mscordaccore_universal) loaded through SOS's
      # standard cDAC hosting path (overlaying the freshly built cDAC next to sos.dll).
      - template: /eng/pipelines/diagnostics/sos-test-leg.yml
        parameters:
          name: cDAC
          dacMode: cdac

      # cDAC_fallback / cDAC_verify: the in-box DAC hosts the cDAC contract reader, with per-API fallback
      # to the legacy DAC (fallback) or no fallback but still verifying against it (verify).
      - template: /eng/pipelines/diagnostics/sos-test-leg.yml
        parameters:
          name: cDAC_fallback
          dacMode: cdacfallback

      - template: /eng/pipelines/diagnostics/sos-test-leg.yml
        parameters:
          name: cDAC_verify
          dacMode: cdacverify

      - template: /eng/pipelines/diagnostics/sos-test-leg.yml
        parameters:
          name: DAC
          dacMode: dac

    # ----------------------------------------------------------------------
    # cDAC managed-side unit tests + DataGenerator tests. Standalone, no
    # native runtime needed; runs every trigger.
    # ----------------------------------------------------------------------
    - stage: CdacUnitTests
      dependsOn: []
      jobs:
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: debug
          platforms:
          - linux_x64
          jobParameters:
            nameSuffix: CdacUnitTests
            # tools.cdactests subset builds both the UnitTests and
            # DataGeneratorTests projects (wired in eng/Subsets.props). -test
            # runs them through their xunit harness.
            buildArgs: -s tools.cdactests -c $(_BuildConfig) -test
            timeoutInMinutes: 120
            enablePublishTestResults: true
            testResultsFormat: 'xunit'

    # ----------------------------------------------------------------------
    # cDAC dump + stress + xplat-dump-gen tests.
    #
    # All three test families live in this one stage so they can use
    # job-level dependsOnGlobalBuilds against the shared CdacBuild jobs
    # (also in this stage) -- linux_x64 test legs start as soon as
    # linux_x64 CdacBuild finishes, no waiting on slower platforms.
    #
    # Runtime is built Checked. The cDAC native shim ships in the Release
    # testhost CdacBuild publishes -- stress tests load it in-process.
    # Dump tests load the managed cDAC assemblies directly and rebuild them
    # at /p:Configuration=Debug during payload prep.
    # ----------------------------------------------------------------------
    - stage: CdacTests
      dependsOn: []
      jobs:
      # Shared per-platform build. Downstream jobs in this stage depend on
      # the per-platform build_<plat>_release_CdacBuild via job-level
      # dependsOnGlobalBuilds: - nameSuffix: CdacBuild.
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: release
          platforms: ${{ parameters.cdacDumpPlatforms }}
          jobParameters:
            nameSuffix: CdacBuild
            buildArgs: -s clr+libs+tools.cdac+tools.cdacdumptests+tools.cdacstresstests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig) /p:SkipDumpVersions=net10.0
            isOfficialBuild: ${{ variables.isOfficialBuild }}
            timeoutInMinutes: 180
            postBuildSteps:
            - template: /eng/pipelines/common/upload-artifact-step.yml
              parameters:
                rootFolder: $(Build.SourcesDirectory)/artifacts/bin
                includeRootFolder: false
                archiveType: $(archiveType)
                archiveExtension: $(archiveExtension)
                tarCompression: $(tarCompression)
                artifactName: CdacBuildArtifacts_$(osGroup)$(osSubgroup)_$(archType)
                displayName: cDAC Shared Build Artifacts

      # cDAC Dump Tests -- single-leg mode, not on schedule.
      - ${{ if and(eq(parameters.cdacDumpTestMode, 'single-leg'), ne(variables['Build.Reason'], 'Schedule')) }}:
        - template: /eng/pipelines/cdac/cdac-helix-test-leg.yml
          parameters:
            nameSuffix: CdacDumpTest
            platforms: ${{ parameters.cdacDumpPlatforms }}
            prepareParameters:
              cdacTestConfig: Debug
            sendDisplayName: 'Send cDAC Dump Tests to Helix'
            sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:DumpTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac /bl:$(Build.SourcesDirectory)/artifacts/log/SendToHelix.binlog
            failErrorMessage: 'One or more cDAC dump test failures were detected. Failing the job.'
            publishDumpsArtifactName: CdacDumps_$(osGroup)_$(archType)

      # cDAC GC Stress Tests. Inline (uses prepare-cdac-stress-helix-steps.yml
      # rather than the dump-side prepare template, and adds a unique testhost
      # artifact for crash-dump symbolication).
      - template: /eng/pipelines/common/platform-matrix.yml
        parameters:
          jobTemplate: /eng/pipelines/common/global-build-job.yml
          buildConfig: release
          platforms: ${{ parameters.cdacStressPlatforms }}
          shouldContinueOnError: true
          jobParameters:
            nameSuffix: CdacStressTest
            buildArgs: -s tools.cdacstresstests -c $(_BuildConfig) -rc checked -lc $(_BuildConfig)
            timeoutInMinutes: 180
            dependsOnGlobalBuilds:
            - nameSuffix: CdacBuild
            preBuildSteps:
            - template: /eng/pipelines/cdac/download-cdac-build-artifact.yml
            postBuildSteps:
            - template: /eng/pipelines/cdac/prepare-cdac-stress-helix-steps.yml
            - template: /eng/pipelines/common/templates/runtimes/send-to-helix-inner-step.yml
              parameters:
                displayName: 'Send cDAC Stress Tests to Helix'
                sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/StressTests/cdac-stress-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacStressHelixQueue)" /p:TestHostPayload=$(StressTestHostRootDir) /p:StressTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac-stress /bl:$(Build.SourcesDirectory)/artifacts/log/SendStressToHelix.binlog
                environment:
                  _Creator: dotnet-bot
                  SYSTEM_ACCESSTOKEN: $(System.AccessToken)
                  NUGET_PACKAGES: $(Build.SourcesDirectory)$(dir).packages
            - pwsh: |
                if ("$(Agent.JobStatus)" -ne "Succeeded") {
                  Write-Error "One or more cDAC stress test failures were detected. Failing the job."
                  exit 1
                }
              displayName: 'Fail on test errors'
              condition: always()
            # On failure, publish the testhost so the crash dumps Helix
            # collects can be symbolicated (needs libcoreclr.so,
            # mscordaccore_universal, corerun + their .dbg/.pdb side files).
            - task: PublishPipelineArtifact@1
              inputs:
                targetPath: '$(StressTestHostRootDir)'
                artifactName: 'TestHost_CdacStress_$(osGroup)$(osSubgroup)_$(archType)_$(_BuildConfig)_Attempt$(System.JobAttempt)'
              displayName: 'Publish TestHost for crash dump symbolication'
              continueOnError: true
              condition: failed()

      # cDAC X-Plat Dump Generation -- xplat mode or schedule. Same template
      # as the single-leg dump tests, plus /p:DumpOnly=true so Helix only
      # generates and returns dumps (no in-process tests).
      - ${{ if or(eq(parameters.cdacDumpTestMode, 'xplat'), eq(variables['Build.Reason'], 'Schedule')) }}:
        - template: /eng/pipelines/cdac/cdac-helix-test-leg.yml
          parameters:
            nameSuffix: CdacXPlatDumpGen
            platforms: ${{ parameters.cdacXPlatDumpPlatforms }}
            prepareParameters:
              cdacTestConfig: Debug
            sendDisplayName: 'Send cDAC Dump Gen to Helix'
            sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-helix.proj /t:Test /p:DumpOnly=true /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:DumpTestsPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac /bl:$(Build.SourcesDirectory)/artifacts/log/SendDumpGenToHelix.binlog
            failDisplayName: 'Fail on dump generation errors'
            failErrorMessage: 'One or more cDAC dump generation failures were detected. Failing the job.'
            publishDumpsArtifactName: CdacDumps_$(osGroup)_$(archType)
            publishDumpsCondition: 'always()'

      # cDAC X-Plat Dump Tests -- runs DumpTests against every source platform's
      # dumps. Cross-platform fan-in: each target's test depends on every source
      # platform's CdacXPlatDumpGen via explicit per-job dependsOn (platform
      # names follow the build_<plat>_release_<suffix> convention). Stays in
      # this stage so it starts as soon as all xplat-gens are done, without
      # waiting on stress tests in the same stage.
      - ${{ if or(eq(parameters.cdacDumpTestMode, 'xplat'), eq(variables['Build.Reason'], 'Schedule')) }}:
        - template: /eng/pipelines/cdac/cdac-helix-test-leg.yml
          parameters:
            nameSuffix: CdacXPlatDumpTest
            platforms: ${{ parameters.cdacXPlatDumpPlatforms }}
            extraDependsOn:
              - ${{ each src in parameters.cdacXPlatDumpPlatforms }}:
                - build_${{ src }}_release_CdacXPlatDumpGen
            prepareParameters:
              buildDebuggees: false
              skipDebuggeeCopy: true
              cdacTestConfig: Debug
            extraStepsBeforeSend:
              # Download dump artifacts from all source platforms.
              - ${{ each platform in parameters.cdacXPlatDumpPlatforms }}:
                - task: DownloadPipelineArtifact@2
                  inputs:
                    artifactName: CdacDumps_${{ platform }}
                    targetPath: $(Build.SourcesDirectory)/artifacts/xplatDumps/${{ platform }}
                  displayName: 'Download dumps from ${{ platform }}'
              # Extract dump tars into the Helix payload.
              - pwsh: |
                  $platforms = "${{ join(';', parameters.cdacXPlatDumpPlatforms) }}".Split(';')
                  $payloadDumpsDir = "$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/dumps"
                  foreach ($platform in $platforms) {
                      $downloadDir = "$(Build.SourcesDirectory)/artifacts/xplatDumps/$platform"
                      $tarFile = Get-ChildItem -Recurse -Filter "dumps.tar.gz" -Path $downloadDir | Select-Object -First 1 -ExpandProperty FullName
                      if (-not $tarFile) {
                          Write-Error "No dumps.tar.gz found for platform $platform in $downloadDir"
                          exit 1
                      }
                      $destDir = Join-Path $payloadDumpsDir $platform
                      New-Item -ItemType Directory -Force -Path $destDir | Out-Null
                      Write-Host "Extracting $tarFile to $destDir"
                      tar -xzf "$tarFile" -C "$destDir"
                  }
                  Write-Host "Dump payload contents:"
                  Get-ChildItem -Recurse $payloadDumpsDir -Filter "*.dmp" | Select-Object -ExpandProperty FullName | ForEach-Object { Write-Host "  $_" }
                displayName: 'Extract Dump Artifacts into Payload'
            sendDisplayName: 'Send cDAC X-Plat Dump Tests to Helix'
            sendParams: $(Build.SourcesDirectory)/src/native/managed/cdac/tests/DumpTests/cdac-dump-xplat-test-helix.proj /t:Test /p:TargetOS=$(osGroup) /p:TargetArchitecture=$(archType) /p:HelixTargetQueues="$(CdacHelixQueue)" /p:TestHostPayload=$(TestHostPayloadDir) /p:TestPayload=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/tests /p:DumpPayloadBase=$(Build.SourcesDirectory)/artifacts/helixPayload/cdac/dumps /bl:$(Build.SourcesDirectory)/artifacts/log/SendXPlatTestToHelix.binlog
            failErrorMessage: 'One or more cDAC x-plat dump test failures were detected. Failing the job.'
