trigger: none

schedules:
- cron: "0 11 * * *" # 11 AM UTC => 3 AM PST
  displayName: Outerloop scheduled build
  branches:
    include:
    - main
    - release/*.0
  always: false # run only if there were changes since the last successful scheduled run.

variables:
  - template: variables.yml

extends:
  template:  /eng/pipelines/common/templates/pipeline-with-resources.yml
  parameters:
    stages:
    - stage: Build
      jobs:

        - template: /eng/pipelines/common/platform-matrix.yml
          parameters:
            jobTemplate: /eng/pipelines/common/global-build-job.yml
            helixQueuesTemplate: /eng/pipelines/libraries/helix-queues-setup.yml
            buildConfig: Release
            platforms:
            - ${{ if eq(variables['includeWindowsOuterloop'], true) }}:
              - windows_x86
              - ${{ if eq(variables['isRollingBuild'], true) }}:
                - windows_x64
            - ${{ if eq(variables['includeLinuxOuterloop'], true) }}:
              - ${{ if eq(variables['isRollingBuild'], true) }}:
                - linux_x64
                - linux_arm
                - linux_arm64
                - linux_musl_x64
                - linux_musl_arm64
            - ${{ if and(eq(variables['includeOsxOuterloop'], true), eq(variables['isRollingBuild'], true)) }}:
              - osx_arm64
              - osx_x64
            jobParameters:
              testScope: outerloop
              nameSuffix: CoreCLR_Release
              buildArgs: -s clr+host.native+libs+libs.tests -lc $(_BuildConfig) -hc $(_BuildConfig) -rc Release -testscope outerloop /p:ArchiveTests=true
              timeoutInMinutes: 180
              includeAllPlatforms: ${{ variables['isRollingBuild'] }}
              # extra steps, run tests
              postBuildSteps:
                - template: /eng/pipelines/libraries/helix.yml
                  parameters:
                    testScope: outerloop
                    creator: dotnet-bot
                    testRunNamePrefixSuffix: CoreCLR_$(_BuildConfig)
                    # On scheduled runs (always:false) don't fail the build on Helix work item or
                    # test failures, so flaky outerloop tests don't keep AzDO re-queueing the same
                    # commit. The Send to Helix step fully succeeds (not partiallySucceeded).
                    ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
                      failOnTestFailures: false

        - ${{ if eq(variables['isRollingBuild'], false) }}:
          - template: /eng/pipelines/common/platform-matrix.yml
            parameters:
              jobTemplate: /eng/pipelines/common/global-build-job.yml
              helixQueuesTemplate: /eng/pipelines/libraries/helix-queues-setup.yml
              buildConfig: Debug
              platforms:
              - ${{ if eq(variables['includeWindowsOuterloop'], true) }}:
                - windows_x64
              - ${{ if eq(variables['includeLinuxOuterloop'], true) }}:
                - linux_x64
                - linux_musl_x64
              - ${{ if eq(variables['includeOsxOuterloop'], true) }}:
                - osx_arm64
                - osx_x64
              jobParameters:
                testScope: outerloop
                nameSuffix: CoreCLR_Debug
                buildArgs: -s clr+host.native+libs+libs.tests -lc $(_BuildConfig) -hc $(_BuildConfig) -rc Release -testscope outerloop /p:ArchiveTests=true
                timeoutInMinutes: 180
                includeAllPlatforms: ${{ variables['isRollingBuild'] }}
                # extra steps, run tests
                postBuildSteps:
                  - template: /eng/pipelines/libraries/helix.yml
                    parameters:
                      testScope: outerloop
                      creator: dotnet-bot
                      testRunNamePrefixSuffix: CoreCLR_$(_BuildConfig)
                      # Don't fail scheduled builds on Helix work item/test failures (see above).
                      ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
                        failOnTestFailures: false

        - ${{ if eq(variables['includeWindowsOuterloop'], true) }}:
          - template: /eng/pipelines/common/platform-matrix.yml
            parameters:
              jobTemplate: /eng/pipelines/common/global-build-job.yml
              helixQueuesTemplate: /eng/pipelines/libraries/helix-queues-setup.yml
              buildConfig: Release
              platforms:
              - windows_x86
              - ${{ if eq(variables['isRollingBuild'], true) }}:
                - windows_x64
              jobParameters:
                framework: net481
                testScope: outerloop
                nameSuffix: NET481
                buildArgs: -s libs+libs.tests -c $(_BuildConfig) -testscope outerloop /p:ArchiveTests=true -f net481
                timeoutInMinutes: 180
                includeAllPlatforms: ${{ variables['isRollingBuild'] }}
                # extra steps, run tests
                postBuildSteps:
                  - template: /eng/pipelines/libraries/helix.yml
                    parameters:
                      testScope: outerloop
                      creator: dotnet-bot
                      extraHelixArguments: /p:BuildTargetFramework=net481
                      # Don't fail scheduled builds on Helix work item/test failures (see above).
                      ${{ if eq(variables['Build.Reason'], 'Schedule') }}:
                        failOnTestFailures: false
