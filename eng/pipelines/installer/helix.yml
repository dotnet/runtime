parameters:
  archType: ''
  osGroup: ''
  osSubgroup: ''
  creator: ''
  helixQueues: ''

steps:
  - template: /eng/common/templates/steps/send-to-helix.yml
    parameters:
      DisplayNamePrefix: Send to Helix
      HelixProjectPath: src/installer/tests/helixpublish.proj
      ${{ if and(ne(parameters.osGroup, 'windows'), ne(parameters.osSubgroup, '_musl')) }}:
        HelixProjectArguments: >-
          --ci
          /p:Configuration=$(_BuildConfig)
          /p:TargetArchitecture=${{ parameters.archType }}
          /p:TargetOS=${{ parameters.osGroup }}
      ${{ if and(ne(parameters.osGroup, 'windows'), eq(parameters.osSubgroup, '_musl')) }}:
        HelixProjectArguments: >-
          --ci
          /p:Configuration=$(_BuildConfig)
          /p:TargetArchitecture=${{ parameters.archType }}
          /p:TargetOS=${{ parameters.osGroup }}
          /p:__PortableTargetOS=linux-musl
      ${{ if eq(parameters.osGroup, 'windows') }}:
        HelixProjectArguments: >-
          -ci
          /p:Configuration=$(_BuildConfig)
          /p:TargetArchitecture=${{ parameters.archType }}
          /p:TargetOS=${{ parameters.osGroup }}
      ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        HelixAccessToken: $(HelixApiAccessToken)
        HelixTargetQueues: ${{ replace(lower(join('+', parameters.helixQueues)), '.open', '') }}
        Creator: ''
      ${{ if eq(variables['System.TeamProject'], 'public') }}:
        Creator: ${{ parameters.creator }}
        HelixTargetQueues: ${{ join('+', parameters.helixQueues) }}
