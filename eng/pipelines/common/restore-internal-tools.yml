steps:
  - task: NuGetAuthenticate@1
    displayName: Authenticate devdiv/dotnet-core-internal-tooling feed (WIF)
    inputs:
      azureDevOpsServiceConnection: dnceng-devdiv-dotnet-core-internal-tooling-feed-rw-wif
      feedUrl: https://pkgs.dev.azure.com/devdiv/_packaging/dotnet-core-internal-tooling/nuget/v3/index.json
      forceReinstallCredentialProvider: true

  - script: $(Build.SourcesDirectory)$(dir)build$(scriptExt)
            -ci
            -restore
            -configuration $(_BuildConfig)
            -projects $(Build.SourcesDirectory)/eng/common/internal/Tools.csproj
            /bl:$(Build.SourcesDirectory)/artifacts/log/$(_BuildConfig)/RestoreInternal.binlog
            /v:normal
    displayName: Restore internal tools
    condition: and(succeeded(), ne(variables['_skipRestoreInternalTools'], 'true'))
