parameters:
  alwaysRun: false
  isExtraPlatformsBuild: false
  isWasmOnlyBuild: false
  platforms: []
  extraBuildArgs: ''

jobs:

#
# Build CoreCLR + libraries for WASI (wasm32-wasi) and run a subset of
# the src/tests CoreCLR runtime tests on Helix under wasmtime.
#
# Mirrors eng/pipelines/common/templates/wasm-runtime-tests.yml (Mono
# variant). Key differences:
#   * runtimeFlavor: coreclr  (Mono variant uses 'mono'/monointerpreter)
#   * buildAllTestsAsStandalone: true  (CoreCLR-WASI tests use the
#     standalone per-test bash wrappers that emit "WASM EXIT N" on
#     stderr; the merged-runner / WasmTestRunner path is Mono-specific)
#   * testBuildArgs restricts the build to the test trees that have
#     been categorized in src/coreclr/wasi/tests/known-failures.txt
#     and verified to have zero unexpected failures locally
#     (~3,700 tests; see runtime/src/coreclr/wasi/tests/README.md).
#
# Helix queue: reuses the existing 'wasi_wasm' mapping in
# eng/pipelines/libraries/helix-queues-setup.yml which already targets
# the ubuntu-26.04-helix-webassembly-amd64 image used by Mono WASI
# tests, so wasmtime is on $PATH in the test work item by construction.
#

- template: /eng/pipelines/common/platform-matrix.yml
  parameters:
    jobTemplate: /eng/pipelines/common/global-build-job.yml
    helixQueuesTemplate: /eng/pipelines/libraries/helix-queues-setup.yml
    buildConfig: Release
    runtimeFlavor: coreclr
    platforms: ${{ parameters.platforms }}
    variables:
      - name: alwaysRunVar
        value: ${{ parameters.alwaysRun }}
      - name: timeoutPerTestInMinutes
        value: 10
      - name: timeoutPerTestCollectionInMinutes
        value: 200
      - name: shouldRunOnDefaultPipelines
        value: $[
          or(
            eq(variables['wasmDarcDependenciesChanged'], true),
            eq(stageDependencies.EvaluatePaths.evaluate_paths.outputs['SetPathVars_tools_illink.containsChange'], true),
            eq(stageDependencies.EvaluatePaths.evaluate_paths.outputs['SetPathVars_wasm_coreclr_runtimetests.containsChange'], true))
          ]
    jobParameters:
      testGroup: innerloop
      isExtraPlatforms: ${{ parameters.isExtraPlatformsBuild }}
      nameSuffix: CoreCLR_WASI_RuntimeTests
      buildArgs: -s clr+libs+packs -c $(_BuildConfig) ${{ parameters.extraBuildArgs }} /p:TestAssemblies=false
      timeoutInMinutes: 180
      condition: >-
        or(
          eq(variables['alwaysRunVar'], true),
          eq(variables['isDefaultPipeline'], variables['shouldRunOnDefaultPipelines']))
      postBuildSteps:
        - template: /eng/pipelines/common/templates/runtimes/build-runtime-tests-and-send-to-helix.yml
          parameters:
            creator: dotnet-bot
            testRunNamePrefixSuffix: CoreCLR_WASI_$(_BuildConfig)
            buildAllTestsAsStandalone: true
            # Initial gate subset: trees where every test either passes or
            # is documented in src/coreclr/wasi/tests/known-failures.txt.
            # Expand once the gate is green for a few weeks. The full list
            # we have verified locally is JIT/jit64, JIT/Regression,
            # JIT/Methodical, JIT/CodeGenBringUpTests, JIT/Generics,
            # JIT/Directed, JIT/opt, baseservices, Loader, GC, Exceptions,
            # reflection, Regressions.
            testBuildArgs: >-
              -priority1
              -tree:JIT/CodeGenBringUpTests
              -tree:JIT/Generics
              -tree:JIT/Directed
              -tree:JIT/opt
              -tree:JIT/jit64
              -tree:Loader
              -tree:Exceptions
              -tree:reflection
      extraVariablesTemplates:
        - template: /eng/pipelines/common/templates/runtimes/test-variables.yml
