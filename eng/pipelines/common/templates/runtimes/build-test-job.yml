parameters:
  buildConfig: ''
  archType: ''
  osGroup: ''
  osSubgroup: ''
  container: ''
  testGroup: ''
  displayNameArgs: ''
  condition: true
  variables: {}
  pool: ''
  runtimeFlavor: 'coreclr'
  runtimeVariant: ''
  dependsOn: []
  crossBuild: false
  isOfficialBuild: false
  useNativeAOTRuntime: false
  useBxl: false

### Build managed test components (native components are getting built as part
### of the product build job).

jobs:
- template: /eng/pipelines/common/templates/runtimes/xplat-job.yml
  parameters:
    buildConfig: ${{ parameters.buildConfig }}
    archType: ${{ parameters.archType }}
    osGroup: ${{ parameters.osGroup }}
    osSubgroup: ${{ parameters.osSubgroup }}
    crossBuild: ${{ parameters.crossBuild }}
    container: ${{ parameters.container }}
    runtimeVariant: ${{ parameters.runtimeVariant }}
    testGroup: ${{ parameters.testGroup }}
    pool: ${{ parameters.pool }}

    # Test jobs should continue on error for internal builds
    ${{ if eq(variables['System.TeamProject'], 'internal') }}:
      continueOnError: true

    # Compute job name from template parameters
    ${{ if in(parameters.testGroup, 'innerloop') }}:
      name: '${{ parameters.runtimeFlavor }}_common_test_build_p0_AnyOS_AnyCPU_${{ parameters.buildConfig }}'
      displayName: '${{ parameters.runtimeFlavor }} Common Pri0 Test Build AnyOS AnyCPU ${{ parameters.buildConfig }}'
    ${{ if notIn(parameters.testGroup, 'innerloop') }}:
      name: '${{ parameters.runtimeFlavor }}_common_test_build_p1_AnyOS_AnyCPU_${{ parameters.buildConfig }}'
      displayName: '${{ parameters.runtimeFlavor }} Common Pri1 Test Build AnyOS AnyCPU ${{ parameters.buildConfig }}'

    # Since the condition is being altered, merge the default with the additional conditions.
    # See https://learn.microsoft.com/azure/devops/pipelines/process/conditions
    condition: and(succeeded(), ${{ parameters.condition }})

    ${{ if ne(parameters.dependsOn[0], '') }}:
      dependsOn: ${{ parameters.dependsOn }}

    ${{ if in(parameters.testGroup, 'innerloop') }}:
      timeoutInMinutes: 90

    ${{ if notIn(parameters.testGroup, 'innerloop') }}:
      timeoutInMinutes: 160

    artifacts:
      publish:
        logs:
          name: '${{ parameters.runtimeFlavor }}_Common_Runtime_TestBuildLogs_Attempt$(System.JobAttempt)_AnyOS_AnyCPU_$(buildConfig)_${{ parameters.testGroup }}'

    variables:
      - ${{ each variable in parameters.variables }}:
        - ${{ variable }}
      - name: liveRuntimeBuildParams
        ${{ if eq(parameters.useBxl, true) }}:
          value: 'clr+libs+clr.iltools -lc Release -rc Checked -ci'
        ${{ else }}:
          value: 'libs+clr.iltools -c Release -ci'

      - name: runtimeFlavorArgs
        value: ''

      - ${{ if eq(parameters.runtimeFlavor, 'mono') }}:
        - name: runtimeFlavorArgs
          value: '-mono'

      - ${{ if and(eq(parameters.runtimeFlavor, 'coreclr'), eq(parameters.useNativeAOTRuntime, true), in(parameters.osGroup, 'ios', 'iossimulator', 'tvos', 'tvossimulator', 'maccatalyst')) }}:
        - name: runtimeFlavorArgs
          value: '-nativeaot'

      - name: testFilterArg
        value: ''

      # Only build GCSimulator tests when the gc-simulator group is specified.
      - ${{ if eq(parameters.testGroup, 'gc-simulator') }}:
          - name: testFilterArg
            value: 'test GC/Scenarios/GC-simulator.csproj'

      - template: /eng/pipelines/common/templates/runtimes/native-test-assets-variables.yml
        parameters:
          runtimeFlavor: coreclr
          testGroup: ${{ parameters.testGroup }}
          liveLibrariesBuildConfig: ${{ parameters.liveLibrariesBuildConfig }}

    steps:

    # Install test build dependencies
    - ${{ if in(parameters.osGroup, 'osx', 'maccatalyst', 'ios', 'iossimulator', 'tvos', 'tvossimulator') }}:
      - script: $(Build.SourcesDirectory)/eng/common/native/install-dependencies.sh $(osGroup)
        displayName: Install native dependencies

    # Build core/libraries dependencies of test build
    - script: $(Build.SourcesDirectory)/build$(scriptExt) $(liveRuntimeBuildParams) $(crossArg)
      displayName: Build coreclr/libs components needed by test build

    - ${{ if in(parameters.osGroup, 'osx', 'ios', 'tvos') }}:
      - script: |
          du -sh $(Build.SourcesDirectory)/*
          df -h
        displayName: Disk Usage before Build

    # Build managed test components
    - ${{ if eq(parameters.useBxl, true) }}:
      # BXL: Generate Core_Root layout, then compile tests via BuildXL
      - script: $(Build.SourcesDirectory)/src/tests/build$(scriptExt) $(buildConfig) $(archType) generatelayoutonly
        displayName: Generate CORE_ROOT for BXL

      - script: $(Build.SourcesDirectory)/src/tests/build$(scriptExt) -bxl $(buildConfig) $(archType)
        displayName: Build tests via BuildXL

      # Stage BXL outputs for Helix
      - script: $(Build.SourcesDirectory)/eng/bxl/prepare-helix-payload.sh --output $(Build.SourcesDirectory)/artifacts/tests/bxl-helix-staging --chunks 30
        displayName: Prepare BXL Helix payload

    - ${{ else }}:
      - script: $(Build.SourcesDirectory)/src/tests/build$(scriptExt) $(logRootNameArg)Managed allTargets skipnative skipgeneratelayout $(buildConfig) $(archType) $(runtimeFlavorArgs) $(crossArg) $(priorityArg) $(testFilterArg) ci /p:TargetOS=AnyOS
        displayName: Build managed test components

    - ${{ if in(parameters.osGroup, 'osx', 'ios', 'tvos') }}:
      - script: |
          du -sh $(Build.SourcesDirectory)/*
          df -h
        displayName: Disk Usage after Build

    # Zip and publish test components
    - ${{ if eq(parameters.useBxl, true) }}:
      # BXL: Upload the staged Helix payload chunks + Core_Root
      - template: /eng/pipelines/common/upload-artifact-step.yml
        parameters:
          rootFolder: '$(Build.SourcesDirectory)/artifacts/tests/bxl-helix-staging'
          includeRootFolder: false
          archiveExtension: '.tar.gz'
          archiveType: tar
          tarCompression: gz
          artifactName: 'BxlHelixPayload_$(osGroup)$(osSubgroup)_$(archType)_$(buildConfigUpper)'
          displayName: 'BXL Helix payload'

      - template: /eng/pipelines/common/upload-artifact-step.yml
        parameters:
          rootFolder: '$(binTestsPath)/$(osGroup).$(archType).$(buildConfigUpper)/Tests/Core_Root'
          includeRootFolder: false
          archiveExtension: '.tar.gz'
          archiveType: tar
          tarCompression: gz
          artifactName: 'BxlCoreRoot_$(osGroup)$(osSubgroup)_$(archType)_$(buildConfigUpper)'
          displayName: 'BXL Core_Root'

    - ${{ else }}:
      - template: /eng/pipelines/common/upload-artifact-step.yml
        parameters:
          rootFolder: '$(binTestsPath)/AnyOS.$(archType).$(buildConfigUpper)'
          includeRootFolder: false
          archiveExtension: '.tar.gz'
          archiveType: tar
          tarCompression: gz
          artifactName: $(managedGenericTestArtifactName)
          displayName: 'managed test components (generic)'


      # Publish .packages/microsoft.net.sdk.il needed for traversing
      # test projects during the copynativeonly command in run test job.
      - template: /eng/pipelines/common/upload-artifact-step.yml
        parameters:
          rootFolder: $(microsoftNetSdkIlFolderPath)
          includeRootFolder: false
          archiveType: tar
          tarCompression: gz
          archiveExtension: '.tar.gz'
          artifactName: $(microsoftNetSdkIlArtifactName)
          displayName: 'Microsoft.NET.Sdk.IL package'
