parameters:
  jobTemplate: ''
  variables: {}
  osGroup: ''
  osSubgroup: ''
  archType: ''
  container: ''
  pool: ''
  platform: ''
  shouldContinueOnError: false
  jobParameters: {}

# parameters.jobParameters.helixQueueGroup values:
# 'pr' -- pull request
# 'ci' -- continuous integration ("merge")
# 'libraries' -- libraries tests
# 'cet' -- machines supporting CET technology
# 'superpmi-diffs' -- as high capacity queues as possible since no OS testing is necessary for this
# Many of these values are unused below, as we use the same queues for many of the scenarios.
# However, having these options allows us to easily tune the queues we use for each scenario as needed based on new hardware support.

jobs:
- template: ${{ parameters.jobTemplate }}
  parameters:
    variables: ${{ parameters.variables }}
    osGroup: ${{ parameters.osGroup }}
    osSubgroup: ${{ parameters.osSubgroup }}
    archType: ${{ parameters.archType }}
    container: ${{ parameters.container }}
    pool: ${{ parameters.pool }}
    platform: ${{ parameters.platform }}
    shouldContinueOnError: ${{ parameters.shouldContinueOnError }}
    helixQueues:

    # iOS Simulator/Mac Catalyst arm64
    - ${{ if in(parameters.platform, 'iossimulator_arm64', 'tvossimulator_arm64', 'maccatalyst_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_ios_simulator_arm64)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_ios_simulator_arm64_internal)

    # iOS/tvOS Simulator x64 & MacCatalyst x64
    - ${{ if in(parameters.platform, 'iossimulator_x64', 'tvossimulator_x64', 'maccatalyst_x64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_ios_simulator_x64)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_ios_simulator_x64_internal)

    # Android arm
    - ${{ if in(parameters.platform, 'android_arm') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - Windows.11.Amd64.Android-armel.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Ubuntu.2204.Amd64.Android.29

    # Android arm64
    - ${{ if in(parameters.platform, 'android_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - Windows.11.Amd64.Android.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Windows.11.Amd64.Android

    # Android x64
    - ${{ if in(parameters.platform, 'android_x64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - Ubuntu.2204.Amd64.Android.29.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Ubuntu.2204.Amd64.Android.29

    # Browser wasm
    - ${{ if eq(parameters.platform, 'browser_wasm') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - (Ubuntu.2604.Amd64.Open)AzureLinux.3.Amd64.Open@mcr.microsoft.com/dotnet-buildtools/prereqs:ubuntu-26.04-helix-webassembly-amd64@sha256:73db6e433bb7e9ef8546b35688b727f2f559b9ac5fea21c77d56795b74b197b8
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - (Ubuntu.2604.Amd64)AzureLinux.3.Amd64@mcr.microsoft.com/dotnet-buildtools/prereqs:ubuntu-26.04-helix-webassembly-amd64@sha256:73db6e433bb7e9ef8546b35688b727f2f559b9ac5fea21c77d56795b74b197b8

    # iOS devices
    - ${{ if in(parameters.platform, 'ios_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_ios_device)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_ios_device_internal)

    # tvOS devices
    - ${{ if in(parameters.platform, 'tvos_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_tvos_device)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_tvos_device_internal)

    # Linux arm
    - ${{ if eq(parameters.platform, 'linux_arm') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - (Debian.13.Arm32.Open)AzureLinux.3.Arm64.Open@mcr.microsoft.com/dotnet-buildtools/prereqs:debian-13-helix-arm32v7@sha256:541bfc7ad7cead26f1e7dc2eaf587e053758966ce42b63b403db2289d74234d7
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - (Debian.13.Arm32)AzureLinux.3.Arm64@mcr.microsoft.com/dotnet-buildtools/prereqs:debian-13-helix-arm32v7@sha256:541bfc7ad7cead26f1e7dc2eaf587e053758966ce42b63b403db2289d74234d7

    # Linux arm64
    - ${{ if eq(parameters.platform, 'linux_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - AzureLinux.3.Arm64.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - AzureLinux.3.Arm64

    # Linux musl x64
    - ${{ if eq(parameters.platform, 'linux_musl_x64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - (Alpine.324.Amd64.Open)AzureLinux.3.Amd64.Open@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-amd64@sha256:98071fda069a2c23198e138f32b096d14074092f1c130477ce3c0ad83786de1c
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - (Alpine.324.Amd64)AzureLinux.3.Amd64@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-amd64@sha256:98071fda069a2c23198e138f32b096d14074092f1c130477ce3c0ad83786de1c

    # Linux musl arm32
    - ${{ if eq(parameters.platform, 'linux_musl_arm') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - (Alpine.324.Arm32.Open)AzureLinux.3.Arm64.Open@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-arm32v7@sha256:a9b4b8ad8f21ddb158c3d98a3cfc112ec3c9a3d9522f7dc62825f9208c9d6099
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - (Alpine.324.Arm32)AzureLinux.3.Arm64@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-arm32v7@sha256:a9b4b8ad8f21ddb158c3d98a3cfc112ec3c9a3d9522f7dc62825f9208c9d6099

    # Linux musl arm64
    - ${{ if eq(parameters.platform, 'linux_musl_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - (Alpine.324.Arm64.Open)AzureLinux.3.Arm64.Open@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-arm64v8@sha256:cb5214cec057ab8624bf2163554d799a2f1cb94d19c2c5b7faa2afbe97b915a6
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - (Alpine.324.Arm64)AzureLinux.3.Arm64@mcr.microsoft.com/dotnet-buildtools/prereqs:alpine-3.24-helix-arm64v8@sha256:cb5214cec057ab8624bf2163554d799a2f1cb94d19c2c5b7faa2afbe97b915a6

    # Linux x64
    - ${{ if eq(parameters.platform, 'linux_x64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - AzureLinux.3.Amd64.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - AzureLinux.3.Amd64

    # OSX arm64
    - ${{ if eq(parameters.platform, 'osx_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_arm64)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_arm64_latest_internal)

    # OSX x64
    - ${{ if eq(parameters.platform, 'osx_x64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - $(helix_macos_x64)
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - $(helix_macos_x64_latest_internal)

    # windows x64
    - ${{ if eq(parameters.platform, 'windows_x64') }}:
      - ${{ if and(eq(variables['System.TeamProject'], 'public'), ne(parameters.jobParameters.helixQueueGroup, 'cet')) }}:
        - Windows.10.Amd64.Open
      - ${{ if and(eq(variables['System.TeamProject'], 'public'), eq(parameters.jobParameters.helixQueueGroup, 'cet')) }}:
        - Windows.11.Amd64.Cet.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Windows.10.Amd64

    # windows x86
    - ${{ if eq(parameters.platform, 'windows_x86') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - Windows.10.Amd64.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Windows.10.Amd64.X86.Rt

    # windows arm64
    - ${{ if eq(parameters.platform, 'windows_arm64') }}:
      - ${{ if eq(variables['System.TeamProject'], 'public') }}:
        - Windows.11.Arm64.Open
      - ${{ if eq(variables['System.TeamProject'], 'internal') }}:
        - Windows.11.Arm64

    ${{ insert }}: ${{ parameters.jobParameters }}
